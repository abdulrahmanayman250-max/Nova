<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova — Break your limits</title>
  <meta name="description"
    content="Nova is a gamified productivity app that helps you level up your skills through tasks, routines, and roadmaps.">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- Tabler Icons (Webfont format) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
    rel="stylesheet">

  <!-- Firebase Integration -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyDyJ417cLdvAza3HHgQitCYM4S66VCfDQs",
      authDomain: "nova-817c4.firebaseapp.com",
      projectId: "nova-817c4",
      storageBucket: "nova-817c4.firebasestorage.app",
      messagingSenderId: "1076873550699",
      appId: "1:1076873550699:web:4e4293c04a59f7eb31ca2e",
      measurementId: "G-KYMVWJQCD4"
    };

    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const googleProvider = new GoogleAuthProvider();
      const firestore = getFirestore(app);

      window.FirebaseAuth = auth;
      window.FirebaseGoogleProvider = googleProvider;
      window.FirebaseSignInWithPopup = signInWithPopup;
      window.FirebaseCreateUser = createUserWithEmailAndPassword;
      window.FirebaseSignInUser = signInWithEmailAndPassword;
      window.FirebaseSendVerification = sendEmailVerification;
      window.FirebaseOnAuthStateChanged = onAuthStateChanged;
      window.FirebaseSignOut = signOut;
      
      window.FirebaseFirestore = firestore;
      window.FirebaseDoc = doc;
      window.FirebaseSetDoc = setDoc;
      window.FirebaseGetDoc = getDoc;
    } catch(e) {
      console.error("Firebase Initialization Failed:", e);
    }
  </script>

  <style>
    .panel-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 17, 26, 0.8);
      backdrop-filter: blur(4px);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .panel-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* ============================================
   Nova Design Tokens
   ============================================ */

    :root {
      /* ---- Colors ---- */
      --bg: #0d0f14;
      --surface: #141720;
      --surface-elevated: #1c1f2c;
      --surface-hover: rgba(255, 255, 255, 0.03);

      --primary-accent: #6c5ce7;
      --secondary-accent: #a29bfe;

      --success: #00b894;
      --warning: #fdcb6e;
      --danger: #e17055;
      --info: #0984e3;

      --text-primary: #e8eaf0;
      --text-muted: #7a7e94;

      --border-color: rgba(255, 255, 255, 0.07);

      /* Transparencies */
      --primary-15: rgba(108, 92, 231, 0.15);
      --success-15: rgba(0, 184, 148, 0.15);
      --warning-15: rgba(253, 203, 110, 0.15);
      --danger-15: rgba(225, 112, 85, 0.15);
      --info-15: rgba(9, 132, 227, 0.15);

      /* Categories */
      --cat-js: var(--warning);
      --cat-python: var(--info);
      --cat-css: var(--success);
      --cat-algorithms: var(--primary-accent);
      --cat-project: var(--danger);

      /* ---- Typography ---- */
      --font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

      --fs-title: 22px;
      --fw-title: 500;

      --fs-section: 11px;
      --fw-section: 500;

      --fs-body: 13px;
      --fw-body: 400;

      --fs-metrics: 24px;
      --fw-metrics: 500;

      --fs-micro: 10px;
      --fw-micro: 400;

      /* ---- Spacing ---- */
      --sp-micro: 4px;
      --sp-xs: 8px;
      --sp-sm: 12px;
      --sp-md: 16px;
      --sp-lg: 24px;
      --sp-xl: 32px;

      /* Layout */
      --sidebar-width: 220px;
      --page-padding: 32px;

      /* ---- Radius ---- */
      --r-card: 12px;
      --r-inner: 8px;
      --r-pill: 20px;

      /* ---- Borders ---- */
      --border-width: 0.5px;
      --border: var(--border-width) solid var(--border-color);

      /* ---- Transitions ---- */
      --t-fast: 150ms ease;
      --t-normal: 250ms ease;
    }


    /* ============================================
   Base Layout & Typography
   ============================================ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-family);
      font-size: var(--fs-body);
      font-weight: var(--fw-body);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-width: 0;
      overflow-x: hidden;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-weight: var(--fw-title);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      background: none;
      border: none;
      color: inherit;
    }

    input,
    select {
      font-family: inherit;
      font-size: inherit;
    }

    /* Global Layout */
    #app-container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100vh;
      background-color: var(--bg);
      border-right: var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0;
      top: 0;
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      padding: var(--page-padding);
      background-color: var(--bg);
      position: relative;
    }

    /* Tab Containers */
    .tab-pane {
      display: none;
      flex-direction: column;
      gap: var(--sp-lg);
      animation: tabFadeIn 0.2s ease forwards;
    }

    .tab-pane.active {
      display: flex;
    }

    @keyframes tabFadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Utility Layouts */
    .grid-1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--sp-lg);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-lg);
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-lg);
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--sp-lg);
    }

    .flex-row {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
    }

    .flex-col {
      display: flex;
      flex-direction: column;
      gap: var(--sp-sm);
    }

    .flex-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }


    /* ============================================
   Components
   ============================================ */

    /* Cards */
    .card {
      background-color: var(--surface);
      border: var(--border);
      border-radius: var(--r-card);
      padding: var(--sp-lg);
      display: flex;
      flex-direction: column;
    }

    .card--secondary {
      background-color: var(--surface-elevated);
    }

    .card-title {
      font-size: var(--fs-title);
      font-weight: var(--fw-title);
      margin-bottom: var(--sp-sm);
    }

    .section-header {
      font-size: var(--fs-section);
      font-weight: var(--fw-section);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: var(--sp-sm);
    }

    /* Metric Cards */
    .metric-card {
      display: flex;
      flex-direction: column;
      gap: var(--sp-micro);
    }

    .metric-label {
      font-size: var(--fs-section);
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .metric-val {
      font-size: var(--fs-metrics);
      font-weight: var(--fw-metrics);
      color: var(--text-primary);
    }

    .metric-trend {
      font-size: var(--fs-micro);
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .metric-trend.up {
      color: var(--success);
    }

    .metric-trend.down {
      color: var(--danger);
    }

    /* Pills */
    .pill {
      padding: 4px 12px;
      border-radius: var(--r-pill);
      font-size: var(--fs-micro);
      font-weight: var(--fw-section);
      background: var(--surface-elevated);
      color: var(--text-muted);
      border: var(--border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .pill.active {
      background: var(--primary-15);
      color: var(--primary-accent);
      border-color: var(--primary-accent);
    }

    /* Icons */
    .icon-box {
      width: 32px;
      height: 32px;
      border-radius: var(--r-inner);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-elevated);
    }

    .icon-box.purple {
      background: var(--primary-15);
      color: var(--primary-accent);
    }

    .icon-box.amber {
      background: var(--warning-15);
      color: var(--warning);
    }

    .icon-box.green {
      background: var(--success-15);
      color: var(--success);
    }

    .icon-box.blue {
      background: var(--info-15);
      color: var(--info);
    }

    .icon-box.coral {
      background: var(--danger-15);
      color: var(--danger);
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: var(--r-inner);
      font-size: var(--fs-body);
      font-weight: var(--fw-title);
      border: var(--border);
      background: var(--surface-elevated);
      color: var(--text-primary);
      transition: all var(--t-fast);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-xs);
    }

    .btn:hover {
      background: var(--surface-hover);
    }

    .btn--primary {
      background: var(--primary-accent);
      color: #fff;
      border-color: var(--primary-accent);
    }

    .btn--primary:hover {
      background: var(--secondary-accent);
      border-color: var(--secondary-accent);
    }

    .btn--outline {
      background: transparent;
      border: 1px solid var(--primary-accent);
      color: var(--primary-accent);
    }

    .btn--outline:hover {
      background: var(--primary-15);
    }

    .btn--danger {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    .btn--danger:hover {
      background: var(--danger-15);
    }

    .btn--sm {
      padding: 4px 10px;
      font-size: 11px;
    }

    /* Form Inputs */
    .input-row {
      display: flex;
      gap: var(--sp-xs);
      align-items: center;
    }

    .input {
      flex: 1;
      background: var(--surface-elevated);
      border: var(--border);
      border-radius: var(--r-inner);
      padding: 10px 14px;
      color: var(--text-primary);
      font-size: var(--fs-body);
      outline: none;
    }

    .input:focus {
      border-color: var(--primary-accent);
    }

    .select {
      background: var(--surface-elevated);
      border: var(--border);
      border-radius: var(--r-inner);
      padding: 10px 30px 10px 14px;
      color: var(--text-primary);
      font-size: var(--fs-body);
      outline: none;
      appearance: none;
      cursor: pointer;
    }

    /* Progress Bar */
    .progress-thin {
      height: 4px;
      background: var(--surface-elevated);
      border-radius: 2px;
      overflow: hidden;
      width: 100%;
    }

    .progress-thin__fill {
      height: 100%;
      background: var(--primary-accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* Checkbox */
    .custom-checkbox {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1.5px solid var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 200ms ease;
      color: transparent;
    }

    .custom-checkbox i {
      font-size: 14px;
    }

    .custom-checkbox.checked {
      background: var(--primary-accent);
      border-color: var(--primary-accent);
      color: #fff;
    }


    /* ============================================
   Sidebar Styles
   ============================================ */
    .sidebar__brand {
      padding: var(--sp-lg);
      font-size: var(--fs-body);
      font-weight: 600;
      color: var(--primary-accent);
      letter-spacing: 2px;
    }

    .sidebar__profile {
      padding: 0 var(--sp-lg) var(--sp-lg) var(--sp-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .sidebar__avatar-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
      margin-bottom: var(--sp-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar__avatar-ring svg {
      background: var(--surface-elevated);
      border-radius: 50%;
      width: 100%;
      height: 100%;
    }

    .sidebar__level-up {
      position: absolute;
      top: 0;
      background: var(--success);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .sidebar__level-up.show {
      opacity: 1;
      transform: translateY(-10px);
    }

    @keyframes pulseRing {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(108, 92, 231, 0.4);
      }

      50% {
        transform: scale(1.05);
        box-shadow: 0 0 0 10px rgba(108, 92, 231, 0);
      }

      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(108, 92, 231, 0);
      }
    }

    .sidebar__name {
      font-weight: 500;
      margin-bottom: 2px;
    }

    .sidebar__level-badge {
      font-size: var(--fs-micro);
      color: var(--primary-accent);
      margin-bottom: var(--sp-md);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .sidebar__xp-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar__xp-bar {
      width: 100%;
      height: 4px;
      background: var(--surface-elevated);
      border-radius: 2px;
      overflow: hidden;
    }

    .sidebar__xp-fill {
      height: 100%;
      background: var(--primary-accent);
      transition: width 0.3s ease;
    }

    .sidebar__xp-label {
      font-size: 8px;
      color: var(--text-muted);
      text-align: right;
    }

    .sidebar__nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 var(--sp-sm);
      gap: 2px;
    }

    .sidebar__nav-section {
      font-size: var(--fs-micro);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: var(--sp-md) var(--sp-sm) var(--sp-micro) var(--sp-sm);
    }

    .sidebar__link {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      padding: 10px var(--sp-sm);
      border-radius: var(--r-inner);
      color: var(--text-muted);
      transition: all var(--t-fast);
      border-left: 2px solid transparent;
    }

    .sidebar__link i {
      font-size: 18px;
    }

    .sidebar__link:hover {
      background: var(--surface-elevated);
      color: var(--text-primary);
    }

    .sidebar__link.active {
      background: var(--primary-15);
      color: var(--primary-accent);
      border-left-color: var(--primary-accent);
    }

    .sidebar__footer {
      padding: var(--sp-lg);
      border-top: var(--border);
    }

    .sidebar__streak {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
    }

    .sidebar__streak-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--warning-15);
      color: var(--warning);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar__streak-val {
      font-weight: 500;
      font-size: var(--fs-body);
    }

    .sidebar__streak-sub {
      font-size: var(--fs-micro);
      color: var(--text-muted);
    }

    .sidebar__reset-btn {
      margin-top: var(--sp-sm);
      width: 100%;
      padding: 6px;
      font-size: 10px;
      color: var(--text-muted);
      border: var(--border);
      border-radius: var(--r-inner);
      background: transparent;
      cursor: pointer;
      transition: all var(--t-fast);
    }

    .sidebar__reset-btn:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: var(--danger-15);
    }


    /* ============================================
   Hero Widget (replaces CharacterEngine)
   ============================================ */
    .hero-widget {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: linear-gradient(135deg, rgba(108, 92, 231, 0.08) 0%, rgba(162, 155, 254, 0.04) 100%);
      padding: var(--sp-xl);
      display: flex;
      align-items: center;
      gap: var(--sp-xl);
      position: relative;
      overflow: hidden;
    }

    .hero-widget::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(108, 92, 231, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-level {
      font-size: 72px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-xp-bar {
      width: 100%;
      height: 10px;
      background: var(--surface-elevated);
      border-radius: 5px;
      overflow: hidden;
      margin-top: 8px;
    }

    .hero-xp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-accent), var(--secondary-accent));
      border-radius: 5px;
      transition: width 0.5s ease-out;
    }

    /* Level-up overlay */
    .level-up-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 10000;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .level-up-overlay.active {
      display: flex;
      pointer-events: auto;
    }

    .level-up-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0;
    }

    .level-up-overlay.active .level-up-flash {
      animation: flash 2.5s ease-out forwards;
    }

    .level-up-text {
      font-size: 64px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 40px var(--primary-accent), 0 0 80px var(--primary-accent);
      transform: translateY(50px);
      opacity: 0;
      z-index: 101;
    }

    .level-up-overlay.active .level-up-text {
      animation: float-up 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes flash {
      0% {
        opacity: 0;
      }

      10% {
        opacity: 0.8;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes float-up {
      0% {
        transform: translateY(50px) scale(0.5);
        opacity: 0;
      }

      20% {
        transform: translateY(0px) scale(1.2);
        opacity: 1;
      }

      80% {
        transform: translateY(-20px) scale(1);
        opacity: 1;
      }

      100% {
        transform: translateY(-50px) scale(0.8);
        opacity: 0;
      }
    }


    /* ============================================
   Drag and Drop Styles (Routine & Roadmap)
   ============================================ */
    .routine-block {
      padding: 6px 8px;
      border-radius: 6px;
      cursor: grab;
      transition: all 0.2s ease;
      position: relative;
    }

    .routine-block:hover {
      filter: brightness(1.2);
    }

    .routine-block:active {
      cursor: grabbing;
    }

    .routine-block.dragging {
      opacity: 0.4;
      transform: scale(0.95);
    }

    .routine-day-col {
      min-height: 300px;
      transition: all 0.2s ease;
    }

    .routine-day-col.drag-over {
      background: rgba(108, 92, 231, 0.06) !important;
      border-color: var(--primary-accent) !important;
      box-shadow: inset 0 0 0 1px var(--primary-accent);
    }

    .routine-block-actions {
      position: absolute;
      top: 2px;
      right: 2px;
      display: none;
      gap: 2px;
    }

    .routine-block:hover .routine-block-actions {
      display: flex;
    }

    .routine-block-actions button {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      cursor: pointer;
      border: none;
    }

    .routine-block-actions button:hover {
      background: rgba(0, 0, 0, 0.7);
    }

    .routine-add-btn {
      width: 100%;
      padding: 4px;
      border-radius: 6px;
      border: 1px dashed var(--border-color);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
      margin-top: 4px;
    }

    .routine-add-btn:hover {
      border-color: var(--primary-accent);
      color: var(--primary-accent);
      background: var(--primary-15);
    }

    /* Inline popover for adding routine blocks */
    .routine-popover {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--surface);
      border: 1px solid var(--primary-accent);
      border-radius: var(--r-inner);
      padding: var(--sp-sm);
      display: none;
      flex-direction: column;
      gap: 6px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      animation: popoverIn 0.15s ease;
    }

    .routine-popover.open {
      display: flex;
    }

    @keyframes popoverIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Inline edit for routine blocks */
    .routine-edit-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }


    /* ============================================
   Roadmap Customization Styles
   ============================================ */
    .roadmap-stage {
      position: relative;
      cursor: grab;
      transition: all 0.2s ease;
    }

    .roadmap-stage:active {
      cursor: grabbing;
    }

    .roadmap-stage.dragging {
      opacity: 0.4;
    }

    .roadmap-stage.drag-over-above {
      border-top: 2px solid var(--primary-accent);
    }

    .roadmap-stage.drag-over-below {
      border-bottom: 2px solid var(--primary-accent);
    }

    .roadmap-stage-actions {
      position: absolute;
      top: var(--sp-sm);
      right: var(--sp-sm);
      display: none;
      gap: 4px;
    }

    .roadmap-stage:hover .roadmap-stage-actions {
      display: flex;
    }

    .roadmap-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px var(--sp-lg);
      text-align: center;
      min-height: 400px;
    }

    .roadmap-add-btn {
      width: 100%;
      padding: 12px;
      border-radius: var(--r-inner);
      border: 1px dashed var(--border-color);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: var(--fs-body);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .roadmap-add-btn:hover {
      border-color: var(--primary-accent);
      color: var(--primary-accent);
      background: var(--primary-15);
    }

    /* Slide-in panel for adding/editing roadmap stages */
    .roadmap-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 400px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border-color);
      z-index: 10001;
      display: flex;
      flex-direction: column;
      padding: var(--sp-xl);
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -10px 0 40px rgba(0, 0, 0, 0.3);
    }

    .roadmap-panel.open {
      right: 0;
    }

    .roadmap-panel-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10000;
      display: none;
    }

    .roadmap-panel-backdrop.open {
      display: block;
    }

    /* Onboarding */
    .onboarding-input {
      background: var(--surface-elevated);
      border: 2px solid var(--border-color);
      border-radius: var(--r-card);
      padding: 14px 20px;

      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .onboarding-start-btn:hover {

      box-shadow: 0 8px 24px rgba(108, 92, 231, 0.3);
    }

    .onboarding-start-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
  </style>
</head>

<body>

  <div id="app-container">
    <!-- Auth Overlay -->
    <div id="auth-overlay"
      style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
      <i class="ti ti-flare" style="font-size: 64px; color: var(--primary-accent); margin-bottom: 16px;"></i>

      <div style="width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 16px;">
        <input type="text" id="auth-name" class="input" placeholder="Name" style="width: 100%; text-align: center; display: none;" />
        <input type="email" id="auth-email" class="input" placeholder="Email" style="width: 100%; text-align: center;" />

        <button class="btn btn--primary" id="auth-submit-btn" style="width: 100%;">Log In</button>
        
        <div style="display: flex; align-items: center; justify-content: center; margin: 8px 0; color: var(--text-muted); font-size: 12px; gap: 8px;">
          <div style="height: 1px; background: var(--border-color); flex: 1;"></div>

        <button class="btn" id="auth-google-btn" style="width: 100%; background: white; color: #333; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; gap: 8px;">

        </div>

    </div>

    <!-- Onboarding Overlay -->
    <div id="onboarding-overlay"
      style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
      <i class="ti ti-flare" style="font-size: 64px; color: var(--primary-accent); margin-bottom: 16px;"></i>
      <h1 style="font-size: 36px; margin-bottom: 8px; color: var(--primary-accent);">Nova</h1>
      <p style="color: var(--text-muted); margin-bottom: 40px; font-size: 16px; font-style: italic;">— Break your limits
        —</p>

      <p style="color: var(--text-primary); margin-bottom: 16px; font-size: 16px;">What should we call you?</p>
      <input type="text" id="onboarding-name-input" class="onboarding-input" placeholder="Enter your name..."
        maxlength="20" style="margin-bottom: 16px;">

      <p style="color: var(--text-primary); margin-bottom: 8px; font-size: 14px;">Select your career path:</p>
      <select id="onboarding-job-input" class="input"
        style="width: 250px; text-align: center; margin-bottom: 24px; font-size: 16px;">
        <option value="developer">Developer</option>

        <option value="designer">Designer / UX</option>
      </select>

      <div style="margin-top: 12px;">
        <button id="onboarding-start-btn" class="onboarding-start-btn" disabled>Get Started <i
            class="ti ti-arrow-right"></i></button>

    <!-- Left Sidebar -->

    <!-- Main Content Area -->

      <!-- Tabs will be rendered here -->

  <!-- Level Up Overlay -->
  <div id="level-up-overlay" class="level-up-overlay">
    <div class="level-up-flash"></div>
    <div class="level-up-text">LEVEL UP!</div>
  </div>

  <div id="timer-floating"
    style="display: none; position: fixed; bottom: 24px; right: 24px; z-index: 500; background: var(--surface-elevated); border: var(--border); border-radius: 8px; padding: 10px 16px; align-items: center; gap: 12px; font-family: monospace; font-size: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); cursor: pointer;">
    <i class="ti ti-player-play" id="floating-btn-play" style="color: var(--success);"

      onclick="FocusTimer.pause(); event.stopPropagation();"></i>

    <i class="ti ti-x" id="floating-btn-stop" style="color: var(--danger);"

  <!-- Roadmap Side Panel -->
  <div id="roadmap-panel-backdrop" class="roadmap-panel-backdrop"></div>
  <div id="roadmap-panel" class="roadmap-panel">
    <div class="flex-between" style="margin-bottom: var(--sp-lg);">
      <h2 id="roadmap-panel-title">Add Stage</h2>
      <button id="roadmap-panel-close" style="font-size: 20px; color: var(--text-muted);"><i
          class="ti ti-x"></i></button>
    </div>
    <div class="flex-col" style="gap: var(--sp-md); flex: 1;">
      <div>
        <label style="display: block; font-size: 12px; margin-bottom: 4px; color: var(--text-muted);">Stage
          Title</label>

          style="width: 100%;">

        <label
          style="display: block; font-size: 12px; margin-bottom: 4px; color: var(--text-muted);">Description</label>
        <textarea id="roadmap-stage-desc" class="input" placeholder="What does this stage involve?"
          style="width: 100%; height: 100px; resize: vertical;"></textarea>

          Level</label>

          style="width: 100%;">

      <div>
        <label style="display: block; font-size: 12px; margin-bottom: 4px; color: var(--text-muted);">Target Skill
          (Bonus XP upon reaching level)</label>
        <select id="roadmap-stage-skill" class="input" style="width: 100%;">
          <!-- Populated by RoadmapTab._openPanel -->
        </select>
      </div>
    </div>
    <button id="roadmap-panel-save" class="btn btn--primary" style="width: 100%; margin-top: var(--sp-lg);">Save
      Stage</button>
  </div>


  <script>
    /* ============================================
       Auth Engine & Scoped Storage
       ============================================ */

    const AuthEngine = {
      currentUser: null,
      
      init() {
        // Seed default account if DB doesn't exist
        const db = this._getDB();
        if (!db['Abdulrahmanayman@nova.com']) {
          db['Abdulrahmanayman@nova.com'] = {
            email: 'Abdulrahmanayman@nova.com',
            password: 'abdo2005',
            name: 'Abdo'
          };
          this._saveDB(db);
        } else if (db['Abdulrahmanayman@nova.com'].name === 'Abdulrahman') {
          // One-time patch for existing local DB
          db['Abdulrahmanayman@nova.com'].name = 'Abdo';
          this._saveDB(db);
        }

        const savedUser = localStorage.getItem('nova_current_user');
        if (savedUser && db[savedUser]) {
          this.currentUser = db[savedUser];
        }
      },

      _getDB() {
        try {
          return JSON.parse(localStorage.getItem('nova_accounts_db')) || {};
        } catch {
          return {};
        }
      },

      _saveDB(db) {
        localStorage.setItem('nova_accounts_db', JSON.stringify(db));
      },

      login(email, password) {
        const db = this._getDB();
        const user = db[email];
        if (user && user.password === password) {
          this.currentUser = user;
          localStorage.setItem('nova_current_user', email);
          return true;
        }
        return false;
      },

      signup(email, password, name) {
        const db = this._getDB();
        if (db[email]) return false; // Already exists
        db[email] = { email, password, name };
        this._saveDB(db);
        this.login(email, password);
        return true;
      },

      logout() {
        this.currentUser = null;
        localStorage.removeItem('nova_current_user');
        location.reload(); 
      }
    };

    AuthEngine.init();

    /* ============================================
       Nova State Store (with localStorage)
       ============================================ */

    const STORAGE_KEY = 'nova_state_v1';

    // PULL FROM FIRESTORE
    async function pullFromFirestore() {
      if (window.FirebaseFirestore && AuthEngine.currentUser) {
        try {
          const uid = AuthEngine.currentUser.uid;
          const docRef = window.FirebaseDoc(window.FirebaseFirestore, 'users', uid);
          const docSnap = await window.FirebaseGetDoc(docRef);
          if (docSnap.exists()) {
            const data = docSnap.data();
            const prefix = `nova_${AuthEngine.currentUser.email}_`;
            for (const key in data) {
              if (key === 'email' || key === 'name') continue; // Don't override auth basics
              localStorage.setItem(`${prefix}${key}`, JSON.stringify(data[key]));
            }
          }
        } catch (e) {
          console.error("Failed to pull from Firestore:", e);
        }
      }
    }

    // SAVE
    function saveToStorage(key, value) {
      try {
        const prefix = AuthEngine.currentUser ? `nova_${AuthEngine.currentUser.email}_` : `nova_`;
        localStorage.setItem(`${prefix}${key}`, JSON.stringify(value));

        // Sync to Firestore if available
        if (window.FirebaseFirestore && AuthEngine.currentUser) {
           const uid = AuthEngine.currentUser.uid;
           const docRef = window.FirebaseDoc(window.FirebaseFirestore, 'users', uid);
           window.FirebaseSetDoc(docRef, { [key]: value }, { merge: true }).catch(err => {
              console.warn("Firestore sync failed:", err);
           });
        }
      } catch (e) {
        console.warn('Storage failed:', e);
      }
    }

    // LOAD
    function loadFromStorage(key, fallback) {
      try {
        const prefix = AuthEngine.currentUser ? `nova_${AuthEngine.currentUser.email}_` : `nova_`;
        const item = localStorage.getItem(`${prefix}${key}`);
        return item ? JSON.parse(item) : fallback;
      } catch (e) {
        return fallback;
      }
    }

    // Helper function for dropdowns
    function getSkillOptionsHTML(jobPath) {
      let html = `<option value="">Auto-Detect Skill</option>`;
      const tree = typeof SkillTrees !== 'undefined' ? SkillTrees[jobPath] : null;
      if (!tree && typeof generateGenericTree !== 'undefined') {
        const genericTree = generateGenericTree(jobPath);
        if (genericTree) {
          genericTree.tiers.forEach(tier => {
            tier.skills.forEach(skill => {
              html += `<option value="${skill.id}">${skill.name}</option>`;
            });
          });
        }
      } else if (tree) {
        tree.tiers.forEach(tier => {
          tier.skills.forEach(skill => {
            html += `<option value="${skill.id}">${skill.name}</option>`;
          });
        });
      }
      return html;
    }

    const Store = {
      _defaults: {
        user: {
          name: '',
          jobPath: 'developer',
          level: 1,
          xp: 0,
          totalXp: 0,
          streak: 0,
          tasksCompleted: 0,
          onboarded: false,
          unlockedAchievements: []
        },
        stats: {
          xpThisWeek: 0,
          hoursCoded: 0,
          skillsActive: 0,
        },
        activeTab: loadFromStorage('activeTab', 'dashboard'),
        todoFilter: 'All',
        progressTimeframe: '30D',
        dailyQuests: [],
        lastQuestRefresh: '',
        todos: [],
        routine: {},
        skills: [],
        recentActivity: [],
        roadmapStages: []
      },

      state: null,

      init() {
        this.state = JSON.parse(JSON.stringify(this._defaults));
        this.load();
      },

      // Listeners for reactivity
      listeners: [],

      subscribe(callback) {
        this.listeners.push(callback);
      },

      notify() {
        this.save();
        this.listeners.forEach(cb => cb(this.state));
      },

      // LocalStorage Persistence
      save() {
        // using 'state_v1' because the helper prepends 'nova_'
        saveToStorage('state_v1', this.state);
      },

      load() {
        const saved = loadFromStorage('state_v1', null);
        if (saved) {
          // Deep merge: apply saved values on top of defaults
          this._deepMerge(this.state, saved);
        }
      },

      _deepMerge(target, source) {
        for (const key in source) {
          if (source.hasOwnProperty(key)) {
            if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key]) && target[key] && typeof target[key] === 'object' && !Array.isArray(target[key])) {
              this._deepMerge(target[key], source[key]);
            } else {
              target[key] = source[key];
            }
          }
        }
      },

      resetAll() {
        localStorage.removeItem(STORAGE_KEY);
        this.state = JSON.parse(JSON.stringify(this._defaults));
        this.notify();
        location.reload();
      },

      // Actions
      startFresh(username, jobPath = 'developer') {
        this.state.user.name = username;
        this.state.user.jobPath = jobPath;
        this.state.user.onboarded = true;
        // Everything stays at zero — user builds from scratch
        this.notify();
      },

      setActiveTab(tab) {
        this.state.activeTab = tab;
        saveToStorage('activeTab', tab);
        this.notify();
      },

      addTodo(text, category, xp = 50, priority = false, skillId = "") {
        this.state.todos.push({
          id: Date.now().toString(),
          text,
          category,
          xp,
          priority,
          skillId,
          section: priority ? 'Priority' : 'Today',
          completed: false,
          subtasks: []
        });
        this.notify();
      },

      setTodoFilter(filter) {
        this.state.todoFilter = filter;
        this.notify();
      },

      addSubtask(taskId, text) {
        const todo = this.state.todos.find(t => String(t.id) === String(taskId));
        if (todo) {
          if (!todo.subtasks) todo.subtasks = [];
          todo.subtasks.push({ text, completed: false });
          this.notify();
        }
      },

      toggleSubtask(taskId, subtaskIdx) {
        const todo = this.state.todos.find(t => String(t.id) === String(taskId));
        if (todo && todo.subtasks && todo.subtasks[subtaskIdx]) {
          const st = todo.subtasks[subtaskIdx];
          st.completed = !st.completed;
          this.notify();
        }
      },

      deleteTodo(id) {
        const idx = this.state.todos.findIndex(t => t.id === id);
        if (idx !== -1) {
          const todo = this.state.todos[idx];
          if (todo.completed) {
            this.addXP(-todo.xp);
            this.state.user.tasksCompleted--;
            logActivityToday(0, -1, -todo.xp);
          }
          this.state.todos.splice(idx, 1);
          this.notify();
        }
      },

      toggleTodo(id) {
        const todo = this.state.todos.find(t => t.id === id);
        if (todo) {
          todo.completed = !todo.completed;
          if (todo.completed) {
            this.addXP(todo.xp);
            this.state.user.tasksCompleted++;
            logActivityToday(0, 1, todo.xp);
            this.addRecentActivity(`Completed task: ${todo.text}`);

            if (typeof QuestEngine !== 'undefined') QuestEngine.progress('tasks', 1);

            // Award skill XP
            if (typeof SkillAttributionEngine !== 'undefined') {
              SkillAttributionEngine.onTaskCompleted(todo, this.state.user.jobPath || 'developer');
            }
          } else {
            this.addXP(-todo.xp);
            this.state.user.tasksCompleted--;
            logActivityToday(0, -1, -todo.xp);
          }
          this.notify();
        }
      },

      setProgressTimeframe(tf) {
        this.state.progressTimeframe = tf;
        this.notify();
      },

      addXP(amount) {
        this.state.user.totalXp = Math.max(0, this.state.user.totalXp + amount);
        this.state.user.xp = Math.max(0, this.state.user.xp + amount);
        this.state.stats.xpThisWeek = Math.max(0, this.state.stats.xpThisWeek + amount);
        
        if (amount > 0 && typeof QuestEngine !== 'undefined') {
          QuestEngine.progress('xp', amount);
        }
        const oldLevel = this.state.user.level;
        Engine.checkLevelUp();
        if (this.state.user.level > oldLevel) {
          App.triggerLevelUp();

          // Check Roadmap completion
          if (this.state.roadmapStages) {
            this.state.roadmapStages.forEach(stage => {
              if (oldLevel < stage.reqLevel && this.state.user.level >= stage.reqLevel) {
                if (stage.targetSkillId && typeof SkillAttributionEngine !== 'undefined') {
                  SkillAttributionEngine.awardSkillXP(stage.targetSkillId, 500, this.state.user.jobPath);
                  this.addRecentActivity(`Reached Roadmap Stage: ${stage.title} (+500 Mastery XP)`);
                } else {
                  this.addRecentActivity(`Reached Roadmap Stage: ${stage.title}`);
                }
              }
            });
          }
        }

        // We already log XP in logActivityToday for tasks, but if XP is added freely,
        // we should make sure we don't double count if called from toggleTodo.
        // However, the spec says "When XP is earned for any reason -> add to today's xpEarned".
        // I'll leave the direct call to logActivityToday in the caller to avoid double counting.
        if (typeof AchievementEngine !== 'undefined') AchievementEngine.check();
        this.notify();
      },

      addRecentActivity(desc) {
        if (!this.state.recentActivity) this.state.recentActivity = [];
        this.state.recentActivity.unshift({
          desc,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        });
        if (this.state.recentActivity.length > 10) {
          this.state.recentActivity.pop();
        }
        this.notify();
      },

      // Routine actions
      addRoutineItem(day, time, activity, color, skillId = "") {
        if (!this.state.routine[day]) this.state.routine[day] = [];
        this.state.routine[day].push({ time, activity, color, completedDates: [], skillId });
        this.state.routine[day].sort((a, b) => a.time.localeCompare(b.time));
        this.notify();
      },

      removeRoutineItem(day, index) {
        if (this.state.routine[day]) {
          this.state.routine[day].splice(index, 1);
          this.notify();
        }
      },

      moveRoutineItem(fromDay, fromIndex, toDay, toIndex) {
        const fromBlocks = this.state.routine[fromDay];
        if (!fromBlocks || !fromBlocks[fromIndex]) return;

        const [item] = fromBlocks.splice(fromIndex, 1);

        if (!this.state.routine[toDay]) {
          this.state.routine[toDay] = [];
        }
        this.state.routine[toDay].splice(toIndex, 0, item);
        // Re-sort by time
        this.state.routine[toDay].sort((a, b) => a.time.localeCompare(b.time));
        this.notify();
      },

      updateRoutineItem(day, index, updates) {
        if (this.state.routine[day] && this.state.routine[day][index]) {
          Object.assign(this.state.routine[day][index], updates);
          this.state.routine[day].sort((a, b) => a.time.localeCompare(b.time));
          this.notify();
        }
      },

      completeRoutineBlock(day, index) {
        const block = this.state.routine[day]?.[index];
        if (!block) return;

        const today = new Date().toISOString().split('T')[0];
        if (!block.completedDates) block.completedDates = [];

        // Prevent completing the same block twice on the same day
        if (block.completedDates.includes(today)) return;

        block.completedDates.push(today);

        if (typeof QuestEngine !== 'undefined') QuestEngine.progress('routine', 1);

        // Keep only last 30 days of completion history
        block.completedDates = block.completedDates.slice(-30);

        // Award skill XP
        if (typeof SkillAttributionEngine !== 'undefined') {
          SkillAttributionEngine.onRoutineBlockCompleted(block, this.state.user.jobPath || 'developer');
        }

        this.notify();
      },

      // Roadmap actions
      addRoadmapStage(title, desc, reqLevel, targetSkillId = "") {
        this.state.roadmapStages.push({
          id: Date.now(),
          title,
          desc,
          reqLevel: parseInt(reqLevel, 10) || 1,
          targetSkillId
        });
        // Sort by reqLevel
        this.state.roadmapStages.sort((a, b) => a.reqLevel - b.reqLevel);
        this.notify();
      },

      updateRoadmapStage(id, updates) {
        const stage = this.state.roadmapStages.find(s => s.id === id);
        if (stage) {
          Object.assign(stage, updates);
          if (updates.reqLevel) stage.reqLevel = parseInt(updates.reqLevel, 10) || 1;
          this.state.roadmapStages.sort((a, b) => a.reqLevel - b.reqLevel);
          this.notify();
        }
      },

      deleteRoadmapStage(id) {
        this.state.roadmapStages = this.state.roadmapStages.filter(s => s.id !== id);
        this.notify();
      },

      reorderRoadmapStages(fromIndex, toIndex) {
        const [item] = this.state.roadmapStages.splice(fromIndex, 1);
        this.state.roadmapStages.splice(toIndex, 0, item);
        this.notify();
      }
    };

    /* ============================================

    function logActivityToday(focusMinutesToAdd = 0, tasksToAdd = 0, xpToAdd = 0) {
      const today = new Date().toISOString().split('T')[0];
      const log = loadFromStorage('activity_log', {});

      if (!log[today]) {
        log[today] = { focusMinutes: 0, tasksCompleted: 0, xpEarned: 0 };
      }

      log[today].focusMinutes += focusMinutesToAdd;
      log[today].tasksCompleted += tasksToAdd;
      log[today].xpEarned += xpToAdd;

      saveToStorage('activity_log', log);
    }

    const TimerState = {
      IDLE: 'idle',           // Not started, showing 00:00:00
      RUNNING: 'running',     // Counting up, showing elapsed time
      PAUSED: 'paused',       // Frozen mid-session, can resume
      SAVED: 'saved',         // Session just saved, brief celebration shown
      NOTES: 'notes',         // Prompting for session notes
    };

    const FocusTimer = {
      state: TimerState.IDLE,
      startTimestamp: null,
      accumulatedSeconds: 0,
      sessionLabel: 'General Focus',
      intervalId: null,
      isPomodoro: false,
      pomodoroDuration: 25 * 60,
      pendingMinutes: 0,
      pendingEvent: null,

      togglePomodoro() {
        if (this.state !== TimerState.IDLE) return;
        this.isPomodoro = !this.isPomodoro;
        this.render();
      },

      start() {
        if (this.state === TimerState.RUNNING) return;
        this.startTimestamp = Date.now();
        this.state = TimerState.RUNNING;
        this.intervalId = setInterval(() => this.tick(), 1000);
        this.render();
      },

      pause() {
        if (this.state !== TimerState.RUNNING) return;
        clearInterval(this.intervalId);
        this.accumulatedSeconds += Math.floor((Date.now() - this.startTimestamp) / 1000);
        this.startTimestamp = null;
        this.state = TimerState.PAUSED;
        this.render();
      },

      stop(e) {
        if (this.state === TimerState.IDLE) return;
        let totalSeconds = this.accumulatedSeconds;
        if (this.state === TimerState.RUNNING) {
          totalSeconds += Math.floor((Date.now() - this.startTimestamp) / 1000);
        }
        clearInterval(this.intervalId);

        const minutesCompleted = Math.floor(totalSeconds / 60);
        if (minutesCompleted > 0) {
          this.pendingMinutes = minutesCompleted;
          this.pendingEvent = e;
          this.state = TimerState.NOTES;
          this.render();
          return;
        }

        this.accumulatedSeconds = 0;
        this.startTimestamp = null;
        this.state = TimerState.SAVED;
        this.render();

        setTimeout(() => {
          this.state = TimerState.IDLE;
          this.render();
        }, 3000);
      },

      submitNotes(note) {
        const minutesCompleted = this.pendingMinutes;
        const e = this.pendingEvent;

        this.saveSession(minutesCompleted);
        logActivityToday(minutesCompleted, 0, 0);

        const dailyHours = loadFromStorage('daily_hours', {});
        const today = new Date().toISOString().split('T')[0];
        dailyHours[today] = (dailyHours[today] || 0) + minutesCompleted;
        saveToStorage('daily_hours', dailyHours);

        const xpEarned = minutesCompleted * 5;
        Store.addXP(xpEarned);

        if (note && note.trim() !== '') {
          Store.addRecentActivity(`Focus Note: ${note}`);
          const sessions = loadFromStorage('focus_sessions', []);
          if (sessions.length > 0) {
            sessions[sessions.length - 1].note = note.trim();
            saveToStorage('focus_sessions', sessions);
          }
        } else {
          Store.addRecentActivity(`Focus: ${minutesCompleted}m on ${this.sessionLabel}`);
        }

        if (typeof QuestEngine !== 'undefined') QuestEngine.progress('focus', minutesCompleted);
        if (e && e.clientX) {
          App.animateXP(xpEarned, e.clientX, e.clientY);
        } else {
          App.animateXP(xpEarned, window.innerWidth / 2, window.innerHeight / 2);
        }

        if (typeof SkillAttributionEngine !== 'undefined') {
          SkillAttributionEngine.onFocusSessionEnded(
            { label: this.sessionLabel, minutes: minutesCompleted },
            Store.state.user.jobPath || 'developer'
          );
        }

        this.accumulatedSeconds = 0;
        this.startTimestamp = null;
        this.state = TimerState.SAVED;
        this.render();

        setTimeout(() => {
          this.state = TimerState.IDLE;
          this.render();
        }, 3000);
      },

      tick() {
        if (this.isPomodoro && this.getCurrentSeconds() <= 0) {
          this.stop();
          new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(() => { });
        }
        this.render();
      },

      getCurrentSeconds() {
        let total = this.accumulatedSeconds;
        if (this.state === TimerState.RUNNING && this.startTimestamp) {
          total += Math.floor((Date.now() - this.startTimestamp) / 1000);
        }
        if (this.isPomodoro) {
          return Math.max(0, this.pomodoroDuration - total);
        }
        return total;
      },

      formatTime(totalSeconds) {
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      },

      saveSession(minutes) {
        const sessions = loadFromStorage('focus_sessions', []);
        sessions.push({
          id: Date.now(),
          date: new Date().toISOString().split('T')[0],
          label: this.sessionLabel,
          minutes: minutes,
          startedAt: new Date(Date.now() - minutes * 60000).toISOString(),
          endedAt: new Date().toISOString(),
        });
        saveToStorage('focus_sessions', sessions);
        Store.notify();
      },

      render() {
        const display = document.getElementById('timer-display');
        const floatDisplay = document.getElementById('floating-display');
        const displayContainer = document.getElementById('timer-section');
        const timeStr = this.formatTime(this.getCurrentSeconds());

        if (display) {
          display.textContent = timeStr;
          if (displayContainer) displayContainer.className = 'card timer-' + this.state;

          const btnStart = document.getElementById('timer-btn-start');
          const btnPause = document.getElementById('timer-btn-pause');
          const btnStop = document.getElementById('timer-btn-stop');
          const controlsContainer = document.getElementById('timer-controls');
          const notesContainer = document.getElementById('timer-notes-container');

          if (controlsContainer) controlsContainer.style.display = this.state === TimerState.NOTES ? 'none' : 'flex';
          if (notesContainer) notesContainer.style.display = this.state === TimerState.NOTES ? 'flex' : 'none';

          if (btnStart) btnStart.style.display = (this.state === TimerState.IDLE || this.state === TimerState.PAUSED || this.state === TimerState.SAVED) ? 'inline-block' : 'none';
          if (btnPause) btnPause.style.display = this.state === TimerState.RUNNING ? 'inline-block' : 'none';
          if (btnStop) btnStop.style.display = (this.state === TimerState.RUNNING || this.state === TimerState.PAUSED) ? 'inline-block' : 'none';

          if (this.state === TimerState.SAVED) {
            if (btnStart) btnStart.style.display = 'none';
          }

          const labelEl = document.getElementById('timer-session-label');
          if (labelEl) labelEl.textContent = this.sessionLabel;

          const pomoToggle = document.getElementById('pomodoro-toggle');
          if (pomoToggle) {
            pomoToggle.textContent = this.isPomodoro ? 'Pomodoro Mode ON' : 'Pomodoro Mode OFF';
            pomoToggle.style.background = this.isPomodoro ? 'var(--primary-15)' : 'var(--surface-elevated)';
            pomoToggle.style.color = this.isPomodoro ? 'var(--primary-accent)' : 'var(--text-muted)';
          }
        }

        if (floatDisplay) {
          floatDisplay.textContent = timeStr;
          const floatWidget = document.getElementById('timer-floating');
          const floatStart = document.getElementById('floating-btn-play');
          const floatPause = document.getElementById('floating-btn-pause');
          const floatStop = document.getElementById('floating-btn-stop');

          if (floatStart) floatStart.style.display = (this.state === TimerState.IDLE || this.state === TimerState.PAUSED) ? 'inline-block' : 'none';
          if (floatPause) floatPause.style.display = this.state === TimerState.RUNNING ? 'inline-block' : 'none';
          if (floatStop) floatStop.style.display = (this.state === TimerState.RUNNING || this.state === TimerState.PAUSED) ? 'inline-block' : 'none';

          if (floatWidget) {
            if (Store.state.activeTab === 'timer') {
              floatWidget.style.display = 'none';
            } else if (this.state !== TimerState.IDLE) {
              floatWidget.style.display = 'flex';
            } else {
              floatWidget.style.display = 'none';
            }
          }
        }

        // Update stats grid in Timer tab
        const elSessions = document.getElementById('timer-stat-sessions');
        const elHours = document.getElementById('timer-stat-hours');
        const elStreak = document.getElementById('timer-stat-streak');

        if (elSessions || elHours || elStreak) {
          const stats = computeAllStats();
          const sessions = loadFromStorage('focus_sessions', []);
          const today = new Date().toISOString().split('T')[0];
          const todaySessions = sessions.filter(s => s.date === today).length;

          if (elSessions) elSessions.textContent = todaySessions;
          if (elHours) elHours.textContent = stats.totalHours + ' hrs';
          if (elStreak) elStreak.textContent = stats.currentStreak + ' days';
        }
      }
    };

    function computeAllStats() {
      const activityLog = loadFromStorage('activity_log', {});
      const logVals = Object.values(activityLog);
      const dates = Object.keys(activityLog).sort((a, b) => new Date(b) - new Date(a)); // newest first

      const totalXp = logVals.reduce((sum, day) => sum + (day.xpEarned || 0), 0);
      const totalTasks = logVals.reduce((sum, day) => sum + (day.tasksCompleted || 0), 0);
      const totalFocusMinutes = logVals.reduce((sum, day) => sum + (day.focusMinutes || 0), 0);
      const totalHours = (totalFocusMinutes / 60).toFixed(1);

      const activeDaysCount = logVals.filter(day => day.focusMinutes > 0 || day.tasksCompleted > 0).length;
      const dailyAverageHours = activeDaysCount > 0 ? (totalFocusMinutes / activeDaysCount / 60).toFixed(1) : '0.0';

      let currentStreak = 0;
      let bestStreak = loadFromStorage('best_streak', 0);

      const today = new Date();
      const getLocalISODate = (d) => {
        const offset = d.getTimezoneOffset() * 60000;
        return new Date(d.getTime() - offset).toISOString().split('T')[0];
      };

      const todayStr = getLocalISODate(today);
      let checkDate = new Date(today);

      let logToday = activityLog[todayStr];
      if (logToday && (logToday.focusMinutes > 0 || logToday.tasksCompleted > 0)) {
        currentStreak++;
      }
      checkDate.setDate(checkDate.getDate() - 1);

      while (true) {
        const dStr = getLocalISODate(checkDate);
        const log = activityLog[dStr];
        if (log && (log.focusMinutes > 0 || log.tasksCompleted > 0)) {
          currentStreak++;
          checkDate.setDate(checkDate.getDate() - 1);
        } else {
          break;
        }
      }

      if (currentStreak > bestStreak) {
        bestStreak = currentStreak;
        saveToStorage('best_streak', bestStreak);
      }

      let bestDayMinutes = 0;
      for (const day of logVals) {
        if (day.focusMinutes > bestDayMinutes) bestDayMinutes = day.focusMinutes;
      }

      let consistencyDays = 0;
      for (let i = 0; i < 7; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const dStr = getLocalISODate(d);
        const log = activityLog[dStr];
        if (log && (log.focusMinutes > 0 || log.tasksCompleted > 0)) {
          consistencyDays++;
        }
      }
      const consistencyScore = Math.round((consistencyDays / 7) * 100);

      return {
        totalXp,
        totalTasks,
        totalFocusMinutes,
        totalHours,
        activeDaysCount,
        dailyAverageHours,
        currentStreak,
        bestStreak,
        bestDayMinutes,
        consistencyScore
      };
    }

    const SkillLevels = [
      { level: 1, name: 'Novice', xpRequired: 0, xpToNext: 500, color: '#7a7e94', barColor: 'rgba(122,126,148,0.6)' },
      { level: 2, name: 'Apprentice', xpRequired: 500, xpToNext: 1000, color: '#0984e3', barColor: 'rgba(9,132,227,0.8)' },
      { level: 3, name: 'Competent', xpRequired: 1500, xpToNext: 2000, color: '#00b894', barColor: 'rgba(0,184,148,0.9)' },
      { level: 4, name: 'Proficient', xpRequired: 3500, xpToNext: 3500, color: '#fdcb6e', barColor: 'rgba(253,203,110,1)' },
      { level: 5, name: 'Master', xpRequired: 7000, xpToNext: null, color: '#6c5ce7', barColor: 'rgba(108,92,231,1)' },
    ];

    function getSkillLevel(totalXP) {
      for (let i = SkillLevels.length - 1; i >= 0; i--) {
        if (totalXP >= SkillLevels[i].xpRequired) {
          return SkillLevels[i];
        }
      }
      return SkillLevels[0];
    }

    function getSkillProgress(totalXP) {
      const current = getSkillLevel(totalXP);
      if (current.level === 5) return 100;
      const xpIntoLevel = totalXP - current.xpRequired;
      return Math.min(100, Math.max(0, Math.round((xpIntoLevel / current.xpToNext) * 100)));
    }

    function generateGenericTree(jobPath) {
      return {
        tiers: [
          {
            id: 'tier-1', name: 'Foundation', unlocksAt: { stage: 1 }, skills: [
              { id: jobPath + '-basics', name: 'Basics', icon: 'ti-book', color: '#e17055', description: 'Core principles', keywords: [jobPath, 'basic', 'intro'] },

            ]
          }
        ]
      };
    }

    const SkillAttributionEngine = {
      findBestSkill(text, jobPath) {
        if (!text || !jobPath) return null;
        const lowerText = text.toLowerCase();

        // dynamically generate tree if not mapped natively
        const tree = SkillTrees[jobPath] || generateGenericTree(jobPath);
        if (!tree) return null;

        let bestMatch = null;
        let bestScore = 0;

        tree.tiers.forEach(tier => {
          tier.skills.forEach(skill => {
            let score = 0;
            skill.keywords.forEach(keyword => {
              if (lowerText.includes(keyword.toLowerCase())) {
                score += keyword.length;
              }
            });
            if (score > bestScore) {
              bestScore = score;
              bestMatch = skill.id;
            }
          });
        });

        return bestScore > 0 ? bestMatch : null;
      },

      awardSkillXP(skillId, xpAmount, jobPath) {
        if (!skillId || xpAmount <= 0) return;

        const skillData = loadFromStorage('skill_data', {});
        const today = new Date().toISOString().split('T')[0];

        if (!skillData[skillId]) {
          skillData[skillId] = { xp: 0, level: 1, lastPracticed: null, totalSessions: 0 };
        }

        const oldLevel = getSkillLevel(skillData[skillId].xp).level;
        skillData[skillId].xp += xpAmount;
        skillData[skillId].lastPracticed = today;
        skillData[skillId].totalSessions = (skillData[skillId].totalSessions || 0) + 1;
        const newLevel = getSkillLevel(skillData[skillId].xp).level;

        saveToStorage('skill_data', skillData);

        const skillActivity = loadFromStorage('skill_activity_log', {});
        if (!skillActivity[today]) skillActivity[today] = {};
        skillActivity[today][skillId] = (skillActivity[today][skillId] || 0) + xpAmount;
        saveToStorage('skill_activity_log', skillActivity);

        if (newLevel > oldLevel) {
          SkillMasteryUI.playSkillLevelUp(skillId, newLevel, jobPath);
        }

        SkillMasteryUI.refreshActiveSkills(jobPath);

        return { oldLevel, newLevel, leveled: newLevel > oldLevel };
      },

      onTaskCompleted(task, jobPath) {
        let skillId = task.skillId;
        if (!skillId) skillId = this.findBestSkill(task.category, jobPath);
        if (!skillId) skillId = this.findBestSkill(task.text, jobPath);
        if (!skillId) skillId = this.getFirstUnlockedSkill(jobPath);

        if (skillId) {
          this.awardSkillXP(skillId, task.xp, jobPath);
        }
      },

      onFocusSessionEnded(session, jobPath) {
        let skillId = session.skillId || this.findBestSkill(session.label, jobPath);
        if (!skillId) skillId = this.getFirstUnlockedSkill(jobPath);

        if (skillId) {
          this.awardSkillXP(skillId, session.minutes, jobPath);
        }
      },

      onRoutineBlockCompleted(block, jobPath) {
        let skillId = block.skillId;
        if (!skillId) skillId = this.findBestSkill(block.activity, jobPath);
        if (!skillId) skillId = this.getFirstUnlockedSkill(jobPath);

        if (skillId) {
          const xp = 30 + Math.floor((block.durationMinutes || 0) / 10);
          this.awardSkillXP(skillId, xp, jobPath);
        }
      },

      getFirstUnlockedSkill(jobPath) {
        const tree = SkillTrees[jobPath] || (typeof SkillsTab !== 'undefined' && generateGenericTree ? generateGenericTree(jobPath) : null);
        if (!tree || !tree.tiers[0] || !tree.tiers[0].skills[0]) return null;
        return tree.tiers[0].skills[0].id;
      },
    };

    const SkillUnlockEngine = {
      isTierUnlocked(tier, jobPath) {
        const userStage = Engine.getStage(Store.state.user.level).stage;
        const skillData = loadFromStorage('skill_data', {});

        if (userStage < (tier.unlocksAt.stage || 1)) return false;

        if (tier.unlocksAt.prerequisite) {
          const { skillId, minLevel } = tier.unlocksAt.prerequisite;
          const prereqXP = skillData[skillId]?.xp || 0;
          const prereqLevel = getSkillLevel(prereqXP).level;
          if (prereqLevel < minLevel) return false;
        }

        return true;
      },

      isSkillUnlocked(skillId, jobPath) {
        const tree = SkillTrees[jobPath] || (typeof SkillsTab !== 'undefined' && generateGenericTree ? generateGenericTree(jobPath) : null);
        if (!tree) return false;

        for (const tier of tree.tiers) {
          const skillInTier = tier.skills.find(s => s.id === skillId);
          if (skillInTier) {
            return this.isTierUnlocked(tier, jobPath);
          }
        }
        return false;
      },

      getUnlockDescription(tier, jobPath) {
        const reqs = [];
        if (tier.unlocksAt.stage > 1) {
          reqs.push(`Reach Stage ${tier.unlocksAt.stage}`);
        }
        if (tier.unlocksAt.prerequisite) {
          const { skillId, minLevel } = tier.unlocksAt.prerequisite;
          const tree = SkillTrees[jobPath] || (typeof SkillsTab !== 'undefined' && generateGenericTree ? generateGenericTree(jobPath) : null);
          let skillName = skillId;
          tree?.tiers.forEach(t => {
            t.skills.forEach(s => { if (s.id === skillId) skillName = s.name; });
          });
          reqs.push(`${skillName} must reach Level ${minLevel}`);
        }
        return reqs.join(' · ');
      },
    };

    const SkillDecayEngine = {
      DECAY_THRESHOLD_DAYS: 14,
      DECAY_RATE_PER_DAY: 10,
      MIN_XP_FLOOR: 0,

      applyDecay() {
        const skillData = loadFromStorage('skill_data', {});
        const today = new Date();
        let changed = false;

        Object.entries(skillData).forEach(([skillId, data]) => {
          if (!data.lastPracticed) return;

          const lastDate = new Date(data.lastPracticed);
          const daysSince = Math.floor((today - lastDate) / (1000 * 60 * 60 * 24));

          if (daysSince > this.DECAY_THRESHOLD_DAYS) {
            const daysDecaying = daysSince - this.DECAY_THRESHOLD_DAYS;
            const decayAmount = daysDecaying * this.DECAY_RATE_PER_DAY;
            const newXP = Math.max(this.MIN_XP_FLOOR, data.xp - decayAmount);

            if (newXP !== data.xp) {
              skillData[skillId].xp = newXP;
              changed = true;
            }
          }
        });

        if (changed) {
          saveToStorage('skill_data', skillData);
        }
      },

      getDecayWarning(skillId) {
        const skillData = loadFromStorage('skill_data', {});
        const data = skillData[skillId];
        if (!data || !data.lastPracticed) return null;

        const today = new Date();
        const lastDate = new Date(data.lastPracticed);
        const daysSince = Math.floor((today - lastDate) / (1000 * 60 * 60 * 24));

        if (daysSince >= this.DECAY_THRESHOLD_DAYS) {
          return `⚠️ Decaying — not practiced in ${daysSince} days`;
        }
        if (daysSince >= 10) {
          return `Practice soon — ${this.DECAY_THRESHOLD_DAYS - daysSince} days until decay`;
        }
        return null;
      },
    };

    const SkillMasteryUI = {
      playSkillLevelUp(skillId, newLevel, jobPath) {
        const card = document.querySelector(`[data-skill-id="${skillId}"]`);

    `;
        toast.textContent = message;

        setTimeout(() => toast.remove(), 3000);

      refreshActiveSkills(jobPath) {
        if (Store.state.activeTab === 'skills') {
          const pane = document.getElementById('tab-skills');
          if (pane && typeof SkillsTab !== 'undefined') SkillsTab.render(pane);
        }
        if (typeof SkillsTab !== 'undefined') {
          SkillsTab.renderDashboardWidget();
        }
      },

      getSkillName(skillId, jobPath) {
        const tree = SkillTrees[jobPath] || (typeof SkillsTab !== 'undefined' && generateGenericTree ? generateGenericTree(jobPath) : null);
        if (!tree) return skillId;
        for (const tier of tree.tiers) {
          for (const skill of tier.skills) {
            if (skill.id === skillId) return skill.name;
          }
        }
        return skillId;
      },
    };


    /* ============================================
       Skills Tab (Full Skill Tree View)
       ============================================ */

    const SkillsTab = {
      render(container) {
        const jobPath = Store.state.user.jobPath || 'developer';
        const tree = SkillTrees[jobPath] || generateGenericTree(jobPath);
        const skillData = loadFromStorage('skill_data', {});
        const stage = Engine.getStage(Store.state.user.level).stage;

        let totalUnlocked = 0;
        let totalMastered = 0;

        // Quick scan
        if (tree) {
          tree.tiers.forEach(tier => {
            tier.skills.forEach(skill => {
              if (SkillUnlockEngine.isSkillUnlocked(skill.id, jobPath)) {
                totalUnlocked++;
                const xp = skillData[skill.id]?.xp || 0;
                if (getSkillLevel(xp).level === 5) totalMastered++;
              }
            });
          });
        }

        container.innerHTML = `
      <div class="flex-between" style="margin-bottom: var(--sp-lg);">
        <div>
          <h1 style="font-size: var(--fs-title); font-weight: var(--fw-title); display: flex; align-items: center; gap: 12px;">
            <i class="ti ti-binary-tree" style="color: var(--primary-accent);"></i> Skill Tree: ${jobPath.charAt(0).toUpperCase() + jobPath.slice(1)}
          </h1>
          <p style="color: var(--text-muted); font-size: var(--fs-body); margin-top: 4px;">Master the abilities required for your career path.</p>
        </div>
        <div class="flex-row" style="gap: 16px;">
          <div style="text-align: right;">
            <div style="font-size: 18px; font-weight: bold; color: var(--text-primary);">${totalUnlocked}</div>
            <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase;">Skills Unlocked</div>
          </div>

            <div style="font-size: 18px; font-weight: bold; color: var(--warning);">${totalMastered}</div>
            <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase;">Skills Mastered</div>
          </div>
        </div>
      </div>

      <div class="skills-tree-container" style="display: flex; flex-direction: column; gap: 40px; padding-bottom: 60px;">
        ${tree ? tree.tiers.map((tier, index) => this._renderTier(tier, index, jobPath, skillData)).join('') : '<div style="color: var(--danger);">Error loading skill tree</div>'}
      </div>
      <div style="text-align: center; color: var(--text-muted); font-size: 11px; margin-top: -20px; margin-bottom: 20px;">XP history tracking active.</div>
    `;

        // Tooltip bindings
        const tooltips = document.querySelectorAll('.skill-card');
        tooltips.forEach(card => {
          card.addEventListener('mouseenter', (e) => this._showTooltip(e, card));
          card.addEventListener('mouseleave', () => this._hideTooltip());

      },

      _renderTier(tier, tierIndex, jobPath, skillData) {
        const isUnlocked = SkillUnlockEngine.isTierUnlocked(tier, jobPath);
        const opacity = isUnlocked ? '1' : '0.5';
        const pointerEvents = isUnlocked ? 'auto' : 'none';
        const filter = isUnlocked ? 'none' : 'grayscale(100%)';
        const unlockMsg = isUnlocked ? '' : `<div style="font-size: 11px; color: var(--danger); margin-top: 4px;"><i class="ti ti-lock"></i> Requires: ${SkillUnlockEngine.getUnlockDescription(tier, jobPath)}</div>`;

        return `
      <div class="skill-tier" style="position: relative; opacity: ${opacity}; filter: ${filter}; pointer-events: ${pointerEvents}; transition: all 0.3s;">
        ${tierIndex > 0 ? '<div style="position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 2px; height: 20px; background: var(--border-color);"></div>' : ''}

        const levelObj = getSkillLevel(data.xp);

        </div>

          <div class="flex-between" style="margin-bottom: 4px;">
            <div style="font-size: 15px; font-weight: 600;">${skill.name}</div>

        </div>
        
        <!-- Hidden data for tooltip -->
        <div class="skill-tooltip-data" style="display: none;">
          <div class="tt-desc">${skill.description}</div>
          <div class="tt-req">${levelObj.level === 5 ? 'MAX LEVEL' : (levelObj.xpToNext - (data.xp - levelObj.xpRequired)) + ' XP to next level'}</div>
          <div class="tt-prac">${data.lastPracticed ? 'Last: ' + data.lastPracticed : 'Never practiced'}</div>
          ${decayWarning ? '<div class="tt-decay" style="color: var(--danger); margin-top: 4px;">' + decayWarning + '</div>' : ''}

      renderDashboardWidget() {
        const container = document.getElementById('dashboard-skills-widget');

        if (!tree) return;

        // Get all unlocked skills that have > 0 XP, sort by last practiced or XP
        let activeSkills = [];
        tree.tiers.forEach(tier => {
          if (SkillUnlockEngine.isTierUnlocked(tier, jobPath)) {
            tier.skills.forEach(skill => {

    const Engine = {
      getXpNeeded(level) {
        if (level <= 5) return 500;
        if (level <= 10) return 1000;
        if (level <= 15) return 2500;
        if (level <= 20) return 5000;
        return 10000;
      },

      getStage(level) {
        let title = '';
        if (level <= 3) {
          title = `Level ${level} — Foundation`;
          return { stage: 1, title };
        }
        if (level <= 8) {
          title = `Level ${level} — Apprentice`;
          return { stage: 2, title };
        }
        if (level <= 14) {
          title = `Level ${level} — Professional`;
          return { stage: 3, title };
        }
        if (level <= 20) {
          title = `Level ${level} — Expert`;
          return { stage: 4, title };
        }
        title = `Level ${level} — Master`;
        return { stage: 5, title };
      },

      checkLevelUp() {
        const user = Store.state.user;
        let needed = this.getXpNeeded(user.level);
        while (user.xp >= needed) {
          user.xp -= needed;
          user.level++;
          needed = this.getXpNeeded(user.level);
        }
      },

        switch (stage) {
          case 1:
            content = `

          <line x1="48" y1="64" x2="48" y2="74" stroke="${color}" stroke-width="2"/>
          <line x1="38" y1="74" x2="58" y2="74" stroke="${color}" stroke-width="2"/>
          <circle cx="48" cy="24" r="10" fill="none" stroke="${color}" stroke-width="2"/>
        `;
            break;
          case 2:
            content = `
          <rect x="16" y="36" width="30" height="20" rx="2" fill="none" stroke="${color}" stroke-width="2"/>
          <rect x="50" y="36" width="30" height="20" rx="2" fill="none" stroke="${color}" stroke-width="2"/>
          <circle cx="48" cy="20" r="10" fill="none" stroke="${color}" stroke-width="2"/>
          <path d="M 38 70 Q 48 50 58 70" fill="none" stroke="${color}" stroke-width="2"/>
        `;
            break;
          case 3:
            content = `
          <rect x="32" y="24" width="32" height="20" rx="2" fill="none" stroke="${color}" stroke-width="2"/>
          <rect x="12" y="32" width="16" height="24" rx="2" fill="none" stroke="${color}" stroke-width="2" transform="rotate(-15 20 44)"/>
          <rect x="68" y="32" width="16" height="24" rx="2" fill="none" stroke="${color}" stroke-width="2" transform="rotate(15 76 44)"/>
          <circle cx="48" cy="66" r="12" fill="none" stroke="${color}" stroke-width="2"/>
        `;
            break;
          case 4:
            content = `
          <rect x="16" y="16" width="64" height="40" rx="2" fill="none" stroke="${color}" stroke-width="2"/>
          <line x1="16" y1="36" x2="80" y2="36" stroke="${color}" stroke-width="1" stroke-dasharray="4 2"/>
          <line x1="48" y1="16" x2="48" y2="56" stroke="${color}" stroke-width="1" stroke-dasharray="4 2"/>
          <circle cx="48" cy="74" r="10" fill="none" stroke="#6c5ce7" stroke-width="2"/>
          <circle cx="28" cy="80" r="6" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.6"/>
          <circle cx="68" cy="80" r="6" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.6"/>
        `;
            break;
          case 5:
            content = `
          <polygon points="48,16 80,36 80,72 48,92 16,72 16,36" fill="none" stroke="${color}" stroke-width="2"/>
          <circle cx="48" cy="54" r="14" fill="none" stroke="#6c5ce7" stroke-width="3"/>

          <line x1="16" y1="72" x2="38" y2="60" stroke="${color}" stroke-width="2"/>
        `;
            break;

        return `<svg width="100%" height="100%" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${content}</svg>`;

      renderFocusSessions() {

          if (s.date === todayStr) dateLabel = `Today, ${new Date(s.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;

          else dateLabel = new Date(s.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

          const h = Math.floor(s.minutes / 60);
          const m = s.minutes % 60;
          const durationStr = h > 0 ? `${h}h ${m}min` : `${m}min`;

          return `
      <div style="display: flex; align-items: flex-start; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border-color); font-size: 13px; gap: 16px;">

        }).join('');
