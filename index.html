      renderHeatmapMonthLabels() {
        const labels = [];
        const currDate = new Date();
        currDate.setDate(currDate.getDate() - 364);

        let currentMonth = -1;
        let cols = 0;

        for (let i = 0; i < 364; i++) {
          const d = new Date(currDate);
          d.setDate(d.getDate() + i);
          if (d.getDay() === 0) cols++; // New column

          if (d.getMonth() !== currentMonth && d.getDate() < 15) { // Roughly start of month
            labels.push({ month: d.toLocaleDateString('en-US', { month: 'short' }), col: cols });
            currentMonth = d.getMonth();
          }
        }

        return `<div style="display: flex; position: relative; height: 20px; font-size: 10px; color: var(--text-muted); margin-bottom: 4px; margin-left: 20px;">
      ${labels.map(l => `<div style="position: absolute; left: ${l.col * 14}px;">${l.month}</div>`).join('')}
    </div>`;
      },

      renderHeatmapGrid() {
        const activityLog = loadFromStorage('activity_log', {});
        const today = new Date();

        let currDate = new Date();
        currDate.setDate(currDate.getDate() - 364 + 1); // 364 days ago

        const startDayOfWeek = currDate.getDay();
        let currentColumn = [];
        const columns = [];

        // pad the first column so day 0 aligns with its actual weekday (0=Sun)
        for (let i = 0; i < startDayOfWeek; i++) {
          currentColumn.push(null);
        }

        for (let i = 0; i < 364; i++) {
          const d = new Date(currDate);
          d.setDate(d.getDate() + i);
          const dateStr = d.toISOString().split('T')[0];
          const log = activityLog[dateStr] || { focusMinutes: 0, tasksCompleted: 0, xpEarned: 0 };

          currentColumn.push({ date: d, dateStr, ...log });

          if (currentColumn.length === 7) {
            columns.push(currentColumn);
            currentColumn = [];
          }
        }
        if (currentColumn.length > 0) {
          while (currentColumn.length < 7) currentColumn.push(null);
          columns.push(currentColumn);
        }

        return columns.map(col => `
      <div style="display: flex; flex-direction: column; gap: 3px;">
        ${col.map(cell => {
          if (!cell) return `<div style="width: 14px; height: 14px; background: transparent;"></div>`;
          let color = 'var(--surface-elevated)';
          if (cell.focusMinutes > 0 && cell.focusMinutes < 30) color = 'rgba(108, 92, 231, 0.20)';
          else if (cell.focusMinutes >= 30 && cell.focusMinutes < 60) color = 'rgba(108, 92, 231, 0.45)';
          else if (cell.focusMinutes >= 60 && cell.focusMinutes < 120) color = 'rgba(108, 92, 231, 0.70)';
          else if (cell.focusMinutes >= 120) color = 'var(--primary-accent)';

          const tooltip = `${cell.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} — ${cell.focusMinutes} min focus, ${cell.tasksCompleted} tasks`;
          return `<div title="${tooltip}" style="width: 14px; height: 14px; border-radius: 2px; background: ${color}; cursor: pointer;"></div>`;
        }).join('')}
      </div>
    `).join('');
      },

      renderCharts() {

          }

          new Chart(xpCtx, {
            type: 'bar',
            data: {
              labels,

                label: 'XP Earned',

                y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#7a7e94', font: { size: 10 } }, beginAtZero: true }
              }
            }

          let labels = ['No Skills Active'];

          if (tree) {
            const activeSkills = [];
            tree.tiers.forEach(t => {

                const level = skillData[s.id]?.level || 0;
                if (level > 0) {
                  activeSkills.push({ name: s.name, level: level });

              });
            });

            if (activeSkills.length > 0) {
              activeSkills.sort((a, b) => b.level - a.level);
              const topSkills = activeSkills.slice(0, 6); // Max 6 for a good radar shape
              labels = topSkills.map(s => s.name);
              data = topSkills.map(s => s.level);

          this._radarChart = new Chart(radarCtx, {
            type: 'radar',
            data: {

              datasets: [{

                  ticks: { display: false },
                  suggestedMin: 0,
                  suggestedMax: Math.max(...data, 5) // Scale appropriately
                }
              }
            }
          });
        }

        this.bindEvents();

        const completionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;

        container.innerHTML = `
      <div class="flex-between" style="margin-bottom: var(--sp-lg);">
        <div>

          <p style="color: var(--text-muted); font-size: var(--fs-body);">Organize your focus and earn XP.</p>

                <option value="Practice" ${currentCat === 'Practice' ? 'selected' : ''}>Practice</option>
                <option value="Project" ${currentCat === 'Project' ? 'selected' : ''}>Project</option>
                <option value="Reading" ${currentCat === 'Reading' ? 'selected' : ''}>Reading</option>
                <option value="Other" ${currentCat === 'Other' ? 'selected' : ''}>Other</option>

              <select id="todo-xp" class="input" style="width: 100%;">
                <option value="25" ${currentXp === '25' ? 'selected' : ''}>25 XP (Quick)</option>
                <option value="50" ${currentXp === '50' ? 'selected' : ''}>50 XP (Normal)</option>
                <option value="100" ${currentXp === '100' ? 'selected' : ''}>100 XP (Hard)</option>
                <option value="150" ${currentXp === '150' ? 'selected' : ''}>150 XP (Epic)</option>
              </select>
            </div>
          </div>
          <div style="margin-top: -8px;">
            <label style="font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; text-transform: uppercase;">Target Skill</label>
            <select id="todo-skill" class="input" style="width: 100%;">
              ${getSkillOptionsHTML(Store.state.user.jobPath || 'developer')}
            </select>
          </div>
          <div class="flex-between" style="margin-top: 8px;">
            <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;">
              <input type="checkbox" id="todo-priority" style="accent-color: var(--primary-accent); width: 16px; height: 16px;" ${currentPrio ? 'checked' : ''}> Mark as Priority
            </label>
            <div style="display: flex; gap: 12px;">
              <button id="todo-cancel-btn" class="btn">Cancel</button>
              <button id="add-todo-btn" class="btn btn--primary">Save Task</button>

      </div>

      <div class="flex-row" style="margin-bottom: var(--sp-lg); overflow-x: auto;">
        ${filterHtml}
      </div>

      <div class="flex-col" style="gap: var(--sp-lg);">
        ${totalTasks === 0 ? `
          <div style="text-align: center; color: var(--text-muted); padding: 48px 0;">
            <i class="ti ti-checklist" style="font-size: 48px; margin-bottom: 16px; display: block; opacity: 0.5;"></i>

            <p style="font-size: 14px;">Click the "+ New Task" button to get started.</p>
          </div>
        ` : `
          ${this._renderSection('Priority', state.todos, state.todoFilter)}
          ${this._renderSection('Today', state.todos, state.todoFilter)}
          ${this._renderSection('Backlog', state.todos, state.todoFilter)}
        `}
      </div>

      ${totalTasks > 0 ? `
      <div class="card card--secondary" style="margin-top: var(--sp-xl); flex-direction: row; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.05);">
        <div style="text-align: center;">
          <div style="font-size: 20px; font-weight: 600;">${totalTasks}</div>
          <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Total Tasks</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 20px; font-weight: 600;">${completedTasks}</div>
          <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Completed</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 20px; font-weight: 600; color: var(--primary-accent);">+${xpToday}</div>
          <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">XP Earned Today</div>

        this.bindEvents();
      },

      _renderSection(sectionName, todos, filter) {
        let filtered = todos.filter(t => t.section === sectionName);
        if (filter === 'Active') filtered = filtered.filter(t => !t.completed);
        else if (filter === 'Completed') filtered = filtered.filter(t => t.completed);
        if (filtered.length === 0) return '';

        return `
      <div>
        <div class="section-header" style="border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
          <span style="width: 8px; height: 8px; border-radius: 50%; background: ${sectionName === 'Priority' ? 'var(--danger)' : (sectionName === 'Today' ? 'var(--primary-accent)' : 'var(--text-muted)')};"></span>
          ${sectionName} <span style="font-size: 12px; color: var(--text-muted); font-weight: normal; margin-left: 8px;">${filtered.length} tasks</span>
        </div>
        <div class="flex-col" style="gap: 12px;">
          ${filtered.map(t => this._renderTaskRow(t)).join('')}
        </div>
      </div>
    `;
      },

      _renderTaskRow(task) {
        const opacity = task.completed ? '0.5' : '1';
        const textDecoration = task.completed ? 'line-through' : 'none';
        const colors = {
          'General': 'var(--text-muted)',
          'Learning': 'var(--info)',
          'Practice': 'var(--warning)',
          'Project': 'var(--danger)',
          'Reading': 'var(--success)',
          'Other': 'var(--text-muted)'
        };
        const catColor = colors[task.category] || 'var(--text-muted)';
        const prioIcon = task.priority ? `<i class="ti ti-flag-filled" style="color: var(--danger); font-size: 14px; margin-right: 6px;" title="Priority"></i>` : '';

        return `
      <div class="card todo-card" data-id="${task.id}" style="padding: 16px; opacity: ${opacity}; transition: all 0.3s ease; border-left: 4px solid ${catColor}; flex-direction: row; align-items: center; justify-content: space-between;">
        <div class="flex-row" style="flex: 1; align-items: flex-start; gap: 16px;">
          <div class="custom-checkbox ${task.completed ? 'checked' : ''}" data-id="${task.id}" style="margin-top: 2px; transform: scale(1.1);">
            <i class="ti ti-check"></i>
          </div>
          <div>
            <div style="font-size: 16px; font-weight: 500; text-decoration: ${textDecoration}; color: ${task.completed ? 'var(--text-muted)' : 'var(--text-primary)'}; margin-bottom: 6px; display: flex; align-items: center;">
              ${prioIcon}${task.text}
            </div>
            <div style="font-size: 12px; color: var(--text-muted); display: flex; gap: 16px; align-items: center;">
              <span style="display: flex; align-items: center; gap: 4px;"><i class="ti ti-tag"></i> ${task.category}</span>
              <span style="color: var(--primary-accent); font-weight: 600; display: flex; align-items: center; gap: 4px;"><i class="ti ti-star"></i> +${task.xp} XP</span>
            </div>
            
            <!-- Subtasks -->
            ${task.subtasks && task.subtasks.length > 0 ? `
              <div style="margin-top: 12px; display: flex; flex-direction: column; gap: 8px;">
                ${task.subtasks.map((st, idx) => `
                  <div style="display: flex; align-items: center; gap: 8px; opacity: ${st.completed ? '0.5' : '1'};">
                    <div class="custom-checkbox subtask-checkbox ${st.completed ? 'checked' : ''}" data-task-id="${task.id}" data-idx="${idx}" style="transform: scale(0.8); width: 16px; height: 16px; margin: 0;">
                      <i class="ti ti-check" style="font-size: 10px;"></i>
                    </div>
                    <div style="font-size: 13px; text-decoration: ${st.completed ? 'line-through' : 'none'}; color: ${st.completed ? 'var(--text-muted)' : 'var(--text-secondary)'};">
                      ${st.text}
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : ''}
            
            <div style="margin-top: 8px; display: flex; align-items: center; gap: 8px; opacity: 0.5;">
              <i class="ti ti-plus" style="font-size: 12px; color: var(--text-muted);"></i>
              <input type="text" class="subtask-input" data-task-id="${task.id}" placeholder="Add subtask..." style="background: transparent; border: none; outline: none; color: var(--text-secondary); font-size: 12px; width: 100%; font-family: inherit;" />
            </div>

          </div>
        </div>
        <div>
          <button class="btn-delete" data-id="${task.id}" style="color: var(--danger); opacity: 0.6; padding: 10px; background: rgba(255,0,0,0.05); border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s;" title="Delete Task"><i class="ti ti-trash"></i></button>
        </div>
      </div>
    `;
      },

      bindEvents() {
        const expandBtn = document.getElementById('todo-expand-btn');
        const cancelBtn = document.getElementById('todo-cancel-btn');
        const formEl = document.getElementById('todo-add-form');

        if (expandBtn && formEl) {
          expandBtn.addEventListener('click', () => {
            formEl.style.display = 'block';
            expandBtn.style.display = 'none';
            document.getElementById('todo-input').focus();
          });
        }

        if (cancelBtn && formEl) {
          cancelBtn.addEventListener('click', () => {
            formEl.style.display = 'none';
            expandBtn.style.display = 'inline-flex';
          });
        }

        const addBtn = document.getElementById('add-todo-btn');
        if (addBtn) {
          addBtn.addEventListener('click', () => {
            const input = document.getElementById('todo-input');
            const cat = document.getElementById('todo-category').value;
            const xp = parseInt(document.getElementById('todo-xp').value, 10);
            const prio = document.getElementById('todo-priority').checked;
            const skillId = document.getElementById('todo-skill')?.value || "";
            if (input.value.trim() !== '') {
              Store.addTodo(input.value.trim(), cat, xp, prio, skillId);
              input.value = '';
              if (formEl) formEl.style.display = 'none';
              if (expandBtn) expandBtn.style.display = 'inline-flex';
            }
          });
          const input = document.getElementById('todo-input');
          if (input) {
            input.addEventListener('keypress', (e) => {
              if (e.key === 'Enter') addBtn.click();
            });
          }
        }

        document.querySelectorAll('.custom-checkbox').forEach(cb => {
          if (cb.classList.contains('subtask-checkbox')) return;
          cb.addEventListener('click', (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            const todo = Store.state.todos.find(t => String(t.id) === String(id));
            if (todo && !todo.completed && todo.xp > 0) {
              App.animateXP(todo.xp, e.clientX, e.clientY);
            }
            Store.toggleTodo(todo ? todo.id : id);
          });
        });

        document.querySelectorAll('.subtask-checkbox').forEach(cb => {
          cb.addEventListener('click', (e) => {
            e.stopPropagation();
            const taskId = e.currentTarget.getAttribute('data-task-id');
            const subIdx = parseInt(e.currentTarget.getAttribute('data-idx'), 10);
            Store.toggleSubtask(taskId, subIdx);
          });
        });

        document.querySelectorAll('.btn-delete').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            const todo = Store.state.todos.find(t => String(t.id) === String(id));
            Store.deleteTodo(todo ? todo.id : id);
          });
        });

        document.querySelectorAll('.subtask-input').forEach(input => {
          input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.currentTarget.value.trim() !== '') {
              e.preventDefault();
              const taskId = e.currentTarget.getAttribute('data-task-id');
              Store.addSubtask(taskId, e.currentTarget.value.trim());
            }
          });
          input.addEventListener('click', (e) => e.stopPropagation());
        });

        document.querySelectorAll('.filter-pill').forEach(pill => {
          pill.addEventListener('click', (e) => {
            Store.setTodoFilter(e.currentTarget.getAttribute('data-filter'));
          });
        });

        // Dynamic hover style for the cards
        const styleId = 'todo-cat-styles';
        if (!document.getElementById(styleId)) {
          const style = document.createElement('style');
          style.id = styleId;
          style.innerHTML = `
        .todo-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .todo-card:hover .btn-delete { opacity: 1 !important; background: rgba(255,0,0,0.1); }
      `;
          document.head.appendChild(style);
        }

        // Swipe logic for tasks
        document.querySelectorAll('.todo-card').forEach(card => {
          let startX = 0;
          let currentX = 0;
          let isDragging = false;
          
          card.style.touchAction = 'pan-y'; // Allow vertical scrolling, handle horizontal in JS

          card.addEventListener('pointerdown', (e) => {
            if (e.target.closest('button, input, .custom-checkbox')) return;
            startX = e.clientX;
            isDragging = true;
            card.style.transition = 'none';
            card.setPointerCapture(e.pointerId);
          });
          
          card.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - startX;
            const id = card.getAttribute('data-id');
            const todo = Store.state.todos.find(t => String(t.id) === String(id));
            if (!todo) return;
            
            // Determine direction based on state
            if (todo.completed) {
              if (deltaX > 0) currentX = 0; // Prevent right swipe if completed
              else currentX = deltaX;
            } else {
              if (deltaX < 0) currentX = 0; // Prevent left swipe if not completed
              else currentX = deltaX;
            }
            
            // Add some resistance
            if (Math.abs(currentX) > 150) {
               currentX = Math.sign(currentX) * (150 + (Math.abs(currentX) - 150) * 0.2);
            }

            card.style.transform = `translateX(${currentX}px)`;
            
            if (Math.abs(currentX) > 80) {
              card.style.opacity = '0.7';
            } else {
              card.style.opacity = todo.completed ? '0.5' : '1';
            }
          });
          
          card.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            card.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease';
            card.releasePointerCapture(e.pointerId);
            
            const id = card.getAttribute('data-id');
            const todo = Store.state.todos.find(t => String(t.id) === String(id));
            
            if (currentX > 80 && todo && !todo.completed) {
              App.animateXP(todo.xp, e.clientX, e.clientY);
              Store.toggleTodo(id);
            } else if (currentX < -80 && todo && todo.completed) {
              Store.toggleTodo(id);
            } else {
              card.style.transform = 'translateX(0)';
              card.style.opacity = todo && todo.completed ? '0.5' : '1';
            }
            currentX = 0;
          });
          
          card.addEventListener('pointercancel', (e) => {
            if (!isDragging) return;
            isDragging = false;
            const id = card.getAttribute('data-id');
            const todo = Store.state.todos.find(t => String(t.id) === String(id));
            card.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
            card.style.transform = 'translateX(0)';
            card.style.opacity = todo && todo.completed ? '0.5' : '1';
            currentX = 0;
          });
        });
      }
    };



    /* ============================================
       Routine Tab (Drag & Drop)
       ============================================ */

    const RoutineTab = {
      _dragData: null,
      isAdjusting: false,
      _container: null,

      render(container) {
        this._container = container;
        const state = Store.state;
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const todayStr = new Date().toLocaleDateString('en-US', { weekday: 'long' });
        const displayDays = this.isAdjusting ? days : [todayStr];

        function getWeekDayDate(dayName) {
          const d = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
          const today = new Date();
          const todayIdx = today.getDay();
          const targetIdx = d.indexOf(dayName);
          const diff = targetIdx - todayIdx;
          const target = new Date(today);
          target.setDate(today.getDate() + diff);
          return target.getDate();
        }

        let totalBlocks = 0;
        days.forEach(d => totalBlocks += (state.routine[d] || []).length);
        const estimatedHours = totalBlocks * 1.5;

        container.innerHTML = `
      <div class="flex-between" style="margin-bottom: var(--sp-lg);">
        <div>
          <h1 style="font-size: var(--fs-title); font-weight: var(--fw-title);">Weekly Routine</h1>
          <p style="color: var(--text-muted); font-size: var(--fs-body);">${this.isAdjusting ? 'Drag blocks between days to reorganize. Click + to add new activities.' : 'Your routine for today.'}</p>
        </div>
        <button class="btn ${this.isAdjusting ? 'btn--primary' : 'btn--outline'}" id="toggle-adjust-routine" style="padding: 8px 16px;">
          ${this.isAdjusting ? 'Done Adjusting' : 'Adjust Routine'}
        </button>
      </div>

      <div class="flex-row" style="margin-bottom: var(--sp-lg); font-size: 11px;">
        ${this._renderLegendItem('Focus Work', 'var(--primary-15)', 'var(--primary-accent)')}
        ${this._renderLegendItem('Learning', 'var(--info-15)', 'var(--info)')}
        ${this._renderLegendItem('Review', 'var(--success-15)', 'var(--success)')}
        ${this._renderLegendItem('Project', 'var(--danger-15)', 'var(--danger)')}
        ${this._renderLegendItem('Challenge', 'var(--warning-15)', 'var(--warning)')}
        ${this._renderLegendItem('Break', 'var(--surface-elevated)', 'var(--text-muted)')}
      </div>

      <div style="display: grid; grid-template-columns: ${this.isAdjusting ? 'repeat(7, 1fr)' : '1fr'}; gap: 12px; margin-bottom: var(--sp-xl);">
        ${displayDays.map(day => {
          const isToday = day === todayStr;
          const blocks = state.routine[day] || [];

          return `
            <div class="card routine-day-col" data-day="${day}" style="padding: 12px; position: relative; ${isToday ? 'border-color: var(--primary-accent); background: rgba(108, 92, 231, 0.03);' : ''}">
              <div style="text-align: center; margin-bottom: 16px;">
                <div style="font-size: 10px; text-transform: uppercase; color: ${isToday ? 'var(--primary-accent)' : 'var(--text-muted)'};">${day.substring(0, 3)}</div>
                <div style="font-size: 18px; font-weight: 500; color: ${isToday ? 'var(--primary-accent)' : 'var(--text-primary)'};">${getWeekDayDate(day)}</div>
              </div>
              
              <div class="flex-col" style="gap: 4px;" id="routine-blocks-${day}">
                ${blocks.map((b, idx) => this._renderTimeBlock(b, day, idx)).join('')}
              </div>

              ${this.isAdjusting ? `
              <button class="routine-add-btn" data-day="${day}" title="Add activity">
                <i class="ti ti-plus"></i>
              </button>
              ` : ''}

              <!-- Inline popover -->
              ${this.isAdjusting ? `
              <div class="routine-popover" id="routine-popover-${day}">
                <input type="time" class="input" id="rp-time-${day}" style="padding: 6px 8px; font-size: 11px;">
                <input type="text" class="input" id="rp-activity-${day}" placeholder="Activity..." style="padding: 6px 8px; font-size: 11px;">
                <select class="input" id="rp-color-${day}" style="padding: 6px 8px; font-size: 11px;">
                  <option value="purple">Focus Work</option>
                  <option value="blue">Learning</option>
                  <option value="green">Review</option>
                  <option value="coral">Project</option>
                  <option value="amber">Challenge</option>
                  <option value="gray">Break</option>
                </select>
                <div style="display: flex; gap: 4px;">
                  <button class="btn btn--primary btn--sm" style="flex: 1;" data-action="add-block" data-day="${day}">Add</button>
                  <button class="btn btn--sm" data-action="cancel-popover" data-day="${day}">Cancel</button>
                </div>
              </div>
              ` : ''}
            </div>
          `;
        }).join('')}
      </div>

      <div class="grid-3">
        <div class="card metric-card" style="align-items: center; text-align: center;">
          <div class="metric-label">Weekly Study Time</div>
          <div class="metric-val">${estimatedHours} hrs</div>
        </div>
        <div class="card metric-card" style="align-items: center; text-align: center;">
          <div class="metric-label">Daily Average</div>
          <div class="metric-val">${(estimatedHours / 7).toFixed(1)} hrs</div>
        </div>
        <div class="card metric-card" style="align-items: center; text-align: center;">
          <div class="metric-label">Total Blocks</div>
          <div class="metric-val">${totalBlocks}</div>
        </div>
      </div>
    `;

        this._bindEvents();
      },

      _renderTimeBlock(block, day, idx) {
        const colorMap = {
          purple: { bg: 'var(--primary-15)', color: 'var(--primary-accent)' },
          blue: { bg: 'var(--info-15)', color: 'var(--info)' },
          green: { bg: 'var(--success-15)', color: 'var(--success)' },
          coral: { bg: 'var(--danger-15)', color: 'var(--danger)' },
          amber: { bg: 'var(--warning-15)', color: 'var(--warning)' },
          gray: { bg: 'var(--surface-elevated)', color: 'var(--text-muted)' }
        };
        const theme = colorMap[block.color] || colorMap.gray;

        const today = new Date().toISOString().split('T')[0];
        const isCompletedToday = (block.completedDates || []).includes(today);

        return `

        const toggleBtn = document.getElementById('toggle-adjust-routine');

          toggleBtn.addEventListener('click', () => {
            RoutineTab.isAdjusting = !RoutineTab.isAdjusting;
            if (RoutineTab._container) RoutineTab.render(RoutineTab._container);
          });
        }

        // Drag and Drop
        document.querySelectorAll('.routine-block[draggable]').forEach(block => {
          block.addEventListener('dragstart', (e) => {
            const day = e.currentTarget.getAttribute('data-day');
            const idx = parseInt(e.currentTarget.getAttribute('data-idx'), 10);
            RoutineTab._dragData = { fromDay: day, fromIndex: idx };
            e.currentTarget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
          });
          block.addEventListener('dragend', (e) => {
            e.currentTarget.classList.remove('dragging');
            document.querySelectorAll('.routine-day-col').forEach(col => col.classList.remove('drag-over'));
          });
        });

        document.querySelectorAll('.routine-day-col').forEach(col => {
          col.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            col.classList.add('drag-over');
          });
          col.addEventListener('dragleave', (e) => {
            col.classList.remove('drag-over');
          });
          col.addEventListener('drop', (e) => {
            e.preventDefault();
            col.classList.remove('drag-over');
            if (!RoutineTab._dragData) return;
            const toDay = col.getAttribute('data-day');
            const blocks = Store.state.routine[toDay] || [];
            Store.moveRoutineItem(
              RoutineTab._dragData.fromDay,
              RoutineTab._dragData.fromIndex,
              toDay,
              blocks.length

            RoutineTab._dragData = null;
          });

            const color = document.getElementById(`rp-color-${day}`).value;

        document.querySelectorAll('[data-action="cancel-popover"]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const day = e.currentTarget.getAttribute('data-day');
            document.getElementById(`routine-popover-${day}`).classList.remove('open');
          });
        });

        // Delete block
        document.querySelectorAll('[data-action="delete-block"]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const day = e.currentTarget.getAttribute('data-day');
            const idx = parseInt(e.currentTarget.getAttribute('data-idx'), 10);
            Store.removeRoutineItem(day, idx);
          });
        });

        // Complete block
        document.querySelectorAll('[data-action="complete-block"]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const day = e.currentTarget.getAttribute('data-day');
            const idx = parseInt(e.currentTarget.getAttribute('data-idx'), 10);
            const block = Store.state.routine[day][idx];
            const today = new Date().toISOString().split('T')[0];

            // Guard: already completed today
            if ((block.completedDates || []).includes(today)) return;

            const xpEarned = 30;
            Store.addXP(xpEarned);
            Store.addRecentActivity(`Completed routine: ${block.activity}`);
            App.animateXP(xpEarned, e.clientX, e.clientY);
            logActivityToday(0, 0, xpEarned);

            if (typeof SkillAttributionEngine !== 'undefined') {

          btn.addEventListener('click', (e) => {
            e.stopPropagation();

            <input type="time" class="input" id="edit-block-time" value="${block.time}" style="width: 100%;">
          </div>
          <div>
            <label style="font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 2px;">Activity</label>

              <option value="blue" ${block.color === 'blue' ? 'selected' : ''}>Learning</option>

              <option value="coral" ${block.color === 'coral' ? 'selected' : ''}>Project</option>
              <option value="amber" ${block.color === 'amber' ? 'selected' : ''}>Challenge</option>
              <option value="gray" ${block.color === 'gray' ? 'selected' : ''}>Break</option>
            </select>
          </div>
        </div>
        <div style="display: flex; gap: 8px; margin-top: var(--sp-md);">
          <button class="btn btn--primary" id="edit-block-save" style="flex: 1;">Save</button>

            cardStyle = 'border-color: var(--primary-accent); background: var(--primary-15);';
            labelColor = 'var(--primary-accent)';

      _bindEvents() {
        // Add stage buttons
        const addFirst = document.getElementById('roadmap-add-first');
        const addMore = document.getElementById('roadmap-add-more');
        if (addFirst) addFirst.addEventListener('click', () => RoadmapTab._openPanel());
        if (addMore) addMore.addEventListener('click', () => RoadmapTab._openPanel());

        // Edit stage
        document.querySelectorAll('[data-action="edit-stage"]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = parseInt(e.currentTarget.getAttribute('data-stage-id'), 10);
            RoadmapTab._openPanel(id);
          });
        });

        // Delete stage
        document.querySelectorAll('[data-action="delete-stage"]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = parseInt(e.currentTarget.getAttribute('data-stage-id'), 10);
            if (confirm('Delete this stage?')) {
              Store.deleteRoadmapStage(id);
            }
          });
        });

        // Drag and Drop for reordering
        document.querySelectorAll('.roadmap-stage[draggable]').forEach(stage => {
          stage.addEventListener('dragstart', (e) => {
            RoadmapTab._dragData = { fromIndex: parseInt(e.currentTarget.getAttribute('data-idx'), 10) };
            e.currentTarget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
          });
          stage.addEventListener('dragend', (e) => {
            e.currentTarget.classList.remove('dragging');
            document.querySelectorAll('.roadmap-stage').forEach(s => {
              s.classList.remove('drag-over-above', 'drag-over-below');
            });
          });
          stage.addEventListener('dragover', (e) => {
            e.preventDefault();
            const rect = e.currentTarget.getBoundingClientRect();
            const mid = rect.top + rect.height / 2;
            e.currentTarget.classList.remove('drag-over-above', 'drag-over-below');
            if (e.clientY < mid) {
              e.currentTarget.classList.add('drag-over-above');
            } else {
              e.currentTarget.classList.add('drag-over-below');
            }
          });
          stage.addEventListener('dragleave', (e) => {
            e.currentTarget.classList.remove('drag-over-above', 'drag-over-below');
          });
          stage.addEventListener('drop', (e) => {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over-above', 'drag-over-below');
            if (!RoadmapTab._dragData) return;
            const toIndex = parseInt(e.currentTarget.getAttribute('data-idx'), 10);
            Store.reorderRoadmapStages(RoadmapTab._dragData.fromIndex, toIndex);
            RoadmapTab._dragData = null;
          });
        });
      },

      _openPanel(editId) {
        const panel = document.getElementById('roadmap-panel');
        const backdrop = document.getElementById('roadmap-panel-backdrop');
        const titleEl = document.getElementById('roadmap-panel-title');
        const saveBtn = document.getElementById('roadmap-panel-save');

        RoadmapTab._editingId = editId || null;

        const skillSel = document.getElementById('roadmap-stage-skill');
        if (skillSel) {
          skillSel.innerHTML = getSkillOptionsHTML(Store.state.user.jobPath || 'developer');
        }

        if (editId) {
          const stage = Store.state.roadmapStages.find(s => s.id === editId);
          if (stage) {
            titleEl.textContent = 'Edit Stage';
            document.getElementById('roadmap-stage-title').value = stage.title;
            document.getElementById('roadmap-stage-desc').value = stage.desc;
            document.getElementById('roadmap-stage-level').value = stage.reqLevel;
            if (skillSel) skillSel.value = stage.targetSkillId || '';
          }
        } else {
          titleEl.textContent = 'Add Stage';
          document.getElementById('roadmap-stage-title').value = '';
          document.getElementById('roadmap-stage-desc').value = '';
          document.getElementById('roadmap-stage-level').value = '';
          if (skillSel) skillSel.value = '';
        }

        panel.classList.add('open');
        backdrop.classList.add('open');
        document.getElementById('roadmap-stage-title').focus();
      },

      _closePanel() {
        document.getElementById('roadmap-panel').classList.remove('open');
        document.getElementById('roadmap-panel-backdrop').classList.remove('open');
        RoadmapTab._editingId = null;
      }
    };

    // Bind roadmap panel events (once, at load time)
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('roadmap-panel-close').addEventListener('click', () => RoadmapTab._closePanel());
      document.getElementById('roadmap-panel-backdrop').addEventListener('click', () => RoadmapTab._closePanel());
      document.getElementById('roadmap-panel-save').addEventListener('click', () => {
        const title = document.getElementById('roadmap-stage-title').value.trim();
        const desc = document.getElementById('roadmap-stage-desc').value.trim();
        const level = document.getElementById('roadmap-stage-level').value;
        const targetSkillId = document.getElementById('roadmap-stage-skill')?.value || '';

        } else {
          Store.addRoadmapStage(title, desc, level, targetSkillId);
        }
        RoadmapTab._closePanel();
      });
    });

        Store.init();

        if (typeof AuthEngine !== 'undefined' && AuthEngine.currentUser) {
           if (Store.state.user.name !== AuthEngine.currentUser.name) {

              Store.startFresh(name, jobPath);
              overlay.style.display = 'none';

          nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doStart();

        this.updateActiveTab();

        this.tabs.forEach(tab => {

      animateXP(amount, x, y) {
        if (amount <= 0) return;
        const el = document.createElement('div');
        el.className = 'xp-float-anim';
        el.innerHTML = `+${amount} XP`;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
      },

      animationPaused: false,
      lastFrameTime: 0,
      animate(time) {
        if (App.animationPaused) return;
        App.lastFrameTime = time || performance.now();
        // Future canvas animation loop
        requestAnimationFrame(App.animate.bind(App));
      }
    };

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        App.animationPaused = true;
      } else {
        App.animationPaused = false;
        App.lastFrameTime = performance.now();
        requestAnimationFrame(App.animate.bind(App));
      }
    });

    // Auth & Quick Add Logic
    document.addEventListener('DOMContentLoaded', () => {
      const authOverlay = document.getElementById('auth-overlay');
      const submitBtn = document.getElementById('auth-submit-btn');
      const toggleModeBtn = document.getElementById('auth-toggle-mode');
      const nameInput = document.getElementById('auth-name');
      const emailInput = document.getElementById('auth-email');
      const pwdInput = document.getElementById('auth-password');
      const errorMsg = document.getElementById('auth-error');
      const authTitle = document.getElementById('auth-title');
      
      let isSignUp = false;

      const startApp = async () => {
        authOverlay.style.display = 'none';
        
        const loader = document.createElement('div');
        loader.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-main);z-index:9999;display:flex;align-items:center;justify-content:center;color:var(--text-main);font-size:18px;';
        loader.innerHTML = '<div class="spinner" style="margin-right:12px;"></div> Syncing cloud data...';
        document.body.appendChild(loader);

        await pullFromFirestore();
        loader.remove();

        App.init();
        if (typeof QuestEngine !== 'undefined') QuestEngine.checkAndRefresh();
        if (typeof AchievementEngine !== 'undefined') AchievementEngine.check();

        // Update greeting based on auth if they haven't onboarded fully yet
        if (AuthEngine.currentUser && !Store.state.user.onboarded) {
           Store.state.user.name = AuthEngine.currentUser.name;
           Store.notify();
        }
      };

      if (AuthEngine.currentUser) {
        startApp();
      } else {
        authOverlay.style.display = 'flex';
      }

      if (submitBtn) {
        const googleBtn = document.getElementById('auth-google-btn');
        if (googleBtn) {
          googleBtn.addEventListener('click', () => {
            if (window.FirebaseSignInWithPopup && window.FirebaseAuth) {
              window.FirebaseSignInWithPopup(window.FirebaseAuth, window.FirebaseGoogleProvider)
                .then(async (result) => {
                  AuthEngine.currentUser = { email: result.user.email, name: result.user.displayName || 'Google User', uid: result.user.uid };
                  localStorage.setItem('nova_current_user', result.user.email);
                  submitBtn.textContent = 'Syncing Data...';
                  startApp();
                  
                  startApp();
                }).catch((error) => {
                  errorMsg.textContent = 'Google sign in failed.';
                  errorMsg.style.display = 'block';
                });
            } else {
              errorMsg.textContent = 'Firebase is not loaded properly.';
              errorMsg.style.display = 'block';
            }
          });
        }

        toggleModeBtn.addEventListener('click', (e) => {
          e.preventDefault();
          isSignUp = !isSignUp;
          nameInput.style.display = isSignUp ? 'block' : 'none';
          authTitle.textContent = isSignUp ? '— Create Account —' : '— Sign In —';
          submitBtn.textContent = isSignUp ? 'Sign Up' : 'Log In';
          toggleModeBtn.textContent = isSignUp ? 'Log in instead' : 'Create an account instead';
          errorMsg.style.display = 'none';
        });

        submitBtn.addEventListener('click', () => {
          const email = emailInput.value.trim();
          const pwd = pwdInput.value.trim();
          const name = nameInput.value.trim();
          
          if (!email || !pwd) return;

          if (window.FirebaseCreateUser && window.FirebaseAuth) {
            // FIREBASE FLOW
            if (isSignUp) {
              if (!name) {
                errorMsg.textContent = 'Name is required';
                errorMsg.style.display = 'block';
                return;
              }
              window.FirebaseCreateUser(window.FirebaseAuth, email, pwd)
                .then(async (cred) => {
                   window.FirebaseSendVerification(cred.user).catch(console.warn);
                   AuthEngine.currentUser = { email: cred.user.email, name, uid: cred.user.uid };
                   localStorage.setItem('nova_current_user', cred.user.email);
                   
                   submitBtn.textContent = 'Syncing...';
                   
                   // Save name to firestore explicitly on signup
                   saveToStorage('user_name', name);
                   
                   alert('A confirmation link has been sent to your email.');
                   startApp();
                }).catch(err => {
                   errorMsg.textContent = err.message;
                   errorMsg.style.display = 'block';
                });
            } else {
              window.FirebaseSignInUser(window.FirebaseAuth, email, pwd)
                .then(async (cred) => {
                   AuthEngine.currentUser = { email: cred.user.email, name: 'User', uid: cred.user.uid };
                   localStorage.setItem('nova_current_user', cred.user.email);
                   
                   submitBtn.textContent = 'Syncing Data...';
                   
                   startApp();
                }).catch(err => {
                   errorMsg.textContent = err.message;
                   errorMsg.style.display = 'block';
                });
            }
          } else {
            // LOCAL MOCK FLOW (Fallback)
            if (isSignUp) {
              if (!name) {
                errorMsg.textContent = 'Name is required';
                errorMsg.style.display = 'block';
                return;
              }
              if (AuthEngine.signup(email, pwd, name)) {
                alert('A confirmation code has been sent to your email (Mock Mode).');
                startApp();
              } else {
                errorMsg.textContent = 'Email already exists';
                errorMsg.style.display = 'block';
              }
            } else {
              if (AuthEngine.login(email, pwd)) {
                startApp();
              } else {
                errorMsg.textContent = 'Invalid credentials';
                errorMsg.style.display = 'block';
              }
            }
          }
        });
        
        pwdInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') submitBtn.click();
        });
      }

      const fab = document.getElementById('fab-quick-add');
      const modal = document.getElementById('quick-add-modal');
      const overlay = document.getElementById('quick-add-overlay');

      const closeQuickAdd = () => {
        modal.classList.remove('open');
        overlay.classList.remove('open');
      };

      if (fab && modal && overlay) {
        fab.addEventListener('click', () => {
          modal.classList.add('open');
          overlay.classList.add('open');
          const skillSelect = document.getElementById('qa-skill');
          if (skillSelect && typeof getSkillOptionsHTML === 'function') {
            skillSelect.innerHTML = getSkillOptionsHTML(Store.state.user.jobPath || 'developer');
          }
          document.getElementById('qa-title').focus();
        });

        overlay.addEventListener('click', closeQuickAdd);
        document.getElementById('qa-cancel').addEventListener('click', closeQuickAdd);

        document.getElementById('qa-save').addEventListener('click', () => {
          const title = document.getElementById('qa-title').value.trim();
          if (!title) return;
          const cat = document.getElementById('qa-category').value;
          const xp = parseInt(document.getElementById('qa-xp').value, 10);
          const prio = document.getElementById('qa-priority').checked;
          const skillId = document.getElementById('qa-skill')?.value || "";
          Store.addTodo(title, cat, xp, prio, skillId);
          document.getElementById('qa-title').value = '';
          closeQuickAdd();
        });
      }
    });

  </script>
  <!-- Quick Add FAB -->
  <button id="fab-quick-add" class="btn btn--primary"
    style="display: none !important;">
    <i class="ti ti-plus"></i>
  </button>

  <div id="quick-add-overlay" class="panel-backdrop"></div>
  <div id="quick-add-modal" class="card">
    <h2 style="margin-bottom: var(--sp-md);">Quick Add Task</h2>
    <div class="flex-col" style="gap: var(--sp-sm);">
      <div>
        <input type="text" class="input" id="qa-title" placeholder="Task Name..." style="width: 100%; font-size: 15px;">
      </div>
      <div class="grid-2" style="gap: 12px;">
        <select class="input" id="qa-category" style="width: 100%;">
          <option value="General">General</option>
          <option value="Learning">Learning</option>
          <option value="Practice">Practice</option>
          <option value="Project">Project</option>
          <option value="Reading">Reading</option>
        </select>
        <select class="input" id="qa-xp" style="width: 100%;">
          <option value="25">25 XP (Quick)</option>
          <option value="50" selected>50 XP (Normal)</option>
          <option value="100">100 XP (Hard)</option>
        </select>
      </div>
      <div style="margin-top: 4px;">
        <select class="input" id="qa-skill" style="width: 100%;">
          <!-- Populated via JS -->
        </select>
      </div>
      <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; margin-top: 4px;">
        <input type="checkbox" id="qa-priority" style="accent-color: var(--primary-accent); width: 16px; height: 16px;">
        Mark as Priority
      </label>
    </div>
    <div style="display: flex; gap: 8px; margin-top: var(--sp-lg); justify-content: flex-end;">
      <button class="btn" id="qa-cancel">Cancel</button>
      <button class="btn btn--primary" id="qa-save">Save Task</button>
    </div>
  </div>

  <style>
    #quick-add-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      z-index: 1002;
      width: 400px;
      max-width: 90vw;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.1, 0.8, 0.2, 1);
    }

    #quick-add-modal.open {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    .xp-float-anim {
      position: fixed;
      color: var(--primary-accent);
      font-weight: 800;
      font-size: 24px;
      pointer-events: none;
      z-index: 9999;
      text-shadow: 0 4px 12px rgba(108, 92, 231, 0.5);
      animation: floatUpXp 1s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
    }

    @keyframes floatUpXp {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.8);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -80px) scale(1.2);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -100px) scale(1);
      }
    }

    /* Mobile Bottom Nav Styles */
    .mobile-nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 8px 12px;
      border-radius: 10px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 52px;
    }

    .mobile-nav-btn i {
      font-size: 20px;
    }

    .mobile-nav-btn.active {
      color: var(--primary-accent);
      background: var(--primary-15);
    }

    .mobile-nav-btn span {
      font-size: 9px;
      font-weight: 500;
    }

    @media (max-width: 768px) {
      #mobile-bottom-nav {
        display: flex !important;
      }
    }

    @media (max-width: 1024px) and (min-width: 769px) {
      :root {
        --sidebar-width: 180px;
        --page-padding: 20px;
      }

      .grid-4 {
        grid-template-columns: repeat(2, 1fr);
      }

      .grid-3 {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero-level {
        font-size: 56px;
      }

      #timer-display {
        font-size: 72px !important;
      }
    }

    /* ============================================
       MOBILE RESPONSIVE OVERRIDES
       Only activates on screens smaller than 768px
       ============================================ */

    @media (max-width: 768px) {

      /* ---- Hide Desktop Sidebar ---- */
      .sidebar {
        display: none;
      }

      /* ---- Remove Sidebar Offset from Main Content ---- */
      .main-content {
        margin-left: 0;
        padding: 16px;
        padding-bottom: 80px; /* Space for bottom nav */
      }

      /* ---- Convert All Grids to Single Column ---- */
      .grid-2,
      .grid-3,
      .grid-4 {
        grid-template-columns: 1fr;
      }

      /* ---- Hero Widget Stack Vertically ---- */
      .hero-widget {
        flex-direction: column;
        align-items: flex-start;
        padding: 20px;
        gap: 12px;
      }

      .hero-level {
        font-size: 48px;
      }

      /* ---- Shrink Cards ---- */
      .card {
        padding: 16px;
      }

      /* ---- Fix Timer Display ---- */
      #timer-display {
        font-size: 52px !important;
        letter-spacing: 2px !important;
      }

      /* ---- Fix Roadmap Panel ---- */
      .roadmap-panel {
        width: 100%;
        right: -100%;
      }

      .roadmap-panel.open {
        right: 0;
      }

      /* ---- Fix Routine Grid (Show Only Today) ---- */
      .routine-day-col {
        min-height: 150px;
      }

      /* ---- Fix Quick Add Modal ---- */
      #quick-add-modal {
        width: 92vw;
      }

      /* ---- Fix FAB Position ---- */
      #fab-quick-add {
        bottom: 80px;
        right: 20px;
        width: 48px;
        height: 48px;
      }

      /* ---- Fix Floating Timer ---- */
      #timer-floating {
        bottom: 80px;
        right: 20px;
        font-size: 13px;
        padding: 8px 12px;
      }

      /* ---- Fix Skill Tree Grid ---- */
      .skills-tree-container .grid-3 {
        grid-template-columns: 1fr;
      }

      /* ---- Fix Skill Card Layout ---- */
      .skill-card {
        flex-direction: column !important;
        align-items: flex-start !important;
      }

      /* ---- Fix Todo Section ---- */
      .todo-card {
        flex-direction: column;
        align-items: flex-start !important;
        gap: 12px;
      }

      /* ---- Fix Onboarding ---- */
      .onboarding-input {
        width: 90vw;
      }

      /* ---- Fix Timeframe Pills on Progress ---- */
      .timeframe-pill {
        padding: 4px 8px;
        font-size: 10px;
      }

      /* ---- Level Up Overlay Text ---- */
      .level-up-text {
        font-size: 40px;
      }

      /* ---- App Container Fix ---- */
      #app-container {
        flex-direction: column;
      }

      /* ---- Fix Charts on Small Screens ---- */
      canvas {
        max-width: 100% !important;
      }

      #dashboard-xp-chart,
      #progress-xp-chart,
      #progress-hours-chart,
      #progress-radar-chart {
        height: 180px !important;
      }
    }
  </style>

  <!-- Mobile Bottom Navigation -->
  <nav id="mobile-bottom-nav" style="
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 64px;
    background: var(--surface);
    border-top: var(--border);
    z-index: 998;
    justify-content: space-around;
    align-items: center;
    padding: 0 8px;
  ">
    <button onclick="Store.setActiveTab('dashboard')" class="mobile-nav-btn" data-tab="dashboard">
      <i class="ti ti-layout-dashboard"></i>
      <span>Home</span>
    </button>
    <button onclick="Store.setActiveTab('todos')" class="mobile-nav-btn" data-tab="todos">
      <i class="ti ti-checkbox"></i>
      <span>Tasks</span>
    </button>
    <button onclick="Store.setActiveTab('timer')" class="mobile-nav-btn" data-tab="timer">
      <i class="ti ti-target"></i>
      <span>Timer</span>
    </button>
    <button onclick="Store.setActiveTab('skills')" class="mobile-nav-btn" data-tab="skills">
      <i class="ti ti-binary-tree"></i>
      <span>Skills</span>
    </button>
    <button onclick="Store.setActiveTab('progress')" class="mobile-nav-btn" data-tab="progress">
      <i class="ti ti-chart-bar"></i>
      <span>Stats</span>
    </button>
    <button onclick="Store.setActiveTab('account')" class="mobile-nav-btn" data-tab="account">
      <i class="ti ti-user"></i>
      <span>Account</span>
    </button>
  </nav>
</body>

</html>
